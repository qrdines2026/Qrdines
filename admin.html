<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f1f5f9; }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    
    /* Animations */
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    @keyframes ring {
      0% { transform: rotate(0); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
      100% { transform: rotate(0); }
    }
    
    .order-card { animation: slideIn 0.3s ease-out; }
    .new-order-alert { animation: pulse 0.5s ease-in-out; }
    .notification-ring { animation: ring 0.5s ease-in-out; }
    
    /* Dark Mode */
    .dark-mode {
      background: #0f172a;
      color: #f1f5f9;
    }
    .dark-mode .bg-white { background: #1e293b; }
    .dark-mode .bg-gray-50 { background: #0f172a; }
    .dark-mode .text-gray-600 { color: #94a3b8; }
    .dark-mode .border-gray-200 { border-color: #334155; }
    
    /* Kitchen Mode */
    .kitchen-mode {
      background: #0a0a0a;
    }
    .kitchen-mode .order-card {
      background: #1a1a1a;
      border: 1px solid #333;
    }
    .kitchen-mode .order-card h3,
    .kitchen-mode .order-card p {
      color: #fff;
    }
    
    /* Toast Notification */
    .toast-notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1f2937;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
  </style>
</head>

  // ======================== LOGGING SYSTEM ========================
  let activityLogs = [];
  
  function addLog(action, details) {
    const log = {

      timestamp: new Date().toISOString(),
      action: action,
      details: details,
      user: currentUser?.email || 'admin'

  // ======================== SOUND NOTIFICATIONS ========================
  function playSound(type) {
    // Use Web Audio API for beep sounds
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    if (type === 'order') {
      oscillator.frequency.value = 880;
      gainNode.gain.value = 0.3;
      oscillator.start();
      setTimeout(() => {
        oscillator.stop();
        audioContext.close();
      }, 300);
    } else if (type === 'request') {
      oscillator.frequency.value = 440;
      gainNode.gain.value = 0.3;
      oscillator.start();
      setTimeout(() => {
        oscillator.stop();
        audioContext.close();
      }, 500);
    }
  }

  // ======================== ORDER MANAGEMENT ========================
  function updateOrderStatus(orderId, newStatus) {
    const order = orders.find(o => o.id === orderId);
    if (order) {
      order.status = newStatus;
      addLog('ORDER_STATUS_UPDATED', { orderId, status: newStatus, table: order.tableNumber });

    playSound('order');
    showNotification(`New order from Table ${newOrder.tableNumber}!`, 'success');

  }
  
  function resolveServiceRequest(requestId) {
    serviceRequests = serviceRequests.filter(r => r.id !== requestId);
    addLog('SERVICE_REQUEST_RESOLVED', { requestId });
    render();
  }
  
  // ======================== TABLE MANAGEMENT ========================
  function getTableStatus() {
    // Update table status based on orders
    tables.forEach(table => {
      const activeOrder = orders.find(o => o.tableNumber === table.id && o.status !== 'Served' && o.status !== 'Declined');
      table.status = activeOrder ? 'occupied' : 'free';
      table.currentOrder = activeOrder;
    });
    return tables;
  }
  
  // ======================== MENU MANAGEMENT ========================
  function addMenuItem(itemData) {
    const newId = Date.now();
    const newItem = { id: newId, ...itemData };
    menuItems.push(newItem);
    localStorage.setItem('restaurant_menu', JSON.stringify(menuItems));
    addLog('MENU_ITEM_ADDED', { item: itemData.name });
    showNotification(`"${itemData.name}" added to menu`, 'success');
    render();
  }
  
  function updateMenuItem(id, updates) {
    const index = menuItems.findIndex(i => i.id == id);
    if (index !== -1) {
      menuItems[index] = { ...menuItems[index], ...updates };
      localStorage.setItem('restaurant_menu', JSON.stringify(menuItems));
      addLog('MENU_ITEM_UPDATED', { id, updates });
      showNotification('Menu item updated', 'success');
      render();
    }
  }
  
  function deleteMenuItem(id, name) {
    if (confirm(`Delete "${name}"?`)) {
      menuItems = menuItems.filter(i => i.id != id);
      localStorage.setItem('restaurant_menu', JSON.stringify(menuItems));
      addLog('MENU_ITEM_DELETED', { id, name });
      showNotification(`"${name}" deleted`, 'info');
      render();
    }
  }
  
  function toggleAvailability(id, currentStatus) {

  }
  
  // ======================== STATISTICS ========================
  function getStats() {
    const today = new Date().toDateString();
    const todayOrders = orders.filter(o => new Date(o.timestamp).toDateString() === today);
    const activeOrders = orders.filter(o => o.status === 'Pending' || o.status === 'Preparing' || o.status === 'Ready');
    const totalRevenue = orders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    
    // Peak hours calculation
    const hourCounts = {};
    orders.forEach(o => {
      const hour = new Date(o.timestamp).getHours();
      hourCounts[hour] = (hourCounts[hour] || 0) + 1;
    });
    const peakHour = Object.entries(hourCounts).sort((a,b) => b[1] - a[1])[0]?.[0] || 19;
    
    return {
      totalOrdersToday: todayOrders.length,
      activeOrders: activeOrders.length,
      revenueToday: todayOrders.reduce((sum, o) => sum + (o.totalPrice || 0), 0),
      peakHour: peakHour + ':00',
      pendingRequests: serviceRequests.length
    };
  }
  
  // ======================== CHART RENDERING ========================
  function renderChart() {
    const canvas = document.getElementById('salesChart');
    if (!canvas) return;
    
    const ctx = canvas.getContext('2d');
    const last7Days = [];
    const salesData = [];
    
    for (let i = 6; i >= 0; i--) {
      const date = new Date();
      date.setDate(date.getDate() - i);
      last7Days.push(date.toLocaleDateString('en-US', { weekday: 'short' }));
      salesData.push(Math.floor(Math.random() * 5000) + 1000);
    }
    
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: last7Days,
        datasets: [{
          label: 'Sales (₹)',
          data: salesData,
          borderColor: '#f97316',
          backgroundColor: 'rgba(249,115,22,0.1)',
          fill: true,
          tension: 0.4,
          pointBackgroundColor: '#f97316',
          pointBorderColor: '#fff',
          pointBorderWidth: 2,
          pointRadius: 4,
          pointHoverRadius: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'top' },
          tooltip: { callbacks: { label: (ctx) => `₹${ctx.raw.toLocaleString()}` } }
        },
        scales: {
          y: { beginAtZero: true, ticks: { callback: (value) => '₹' + value.toLocaleString() } }
        }
      }
    });
  }
  
  // ======================== UI HELPERS ========================
  function showNotification(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i>${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function formatCurrency(amount) { return '₹' + amount.toFixed(2); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

        <!-- Charts & Activity -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          <div class="bg-white rounded-xl shadow-sm p-5">

              ${recentActivity.map(act => `
                <div class="flex items-center gap-3 p-2 border-b">
                  <div class="w-8 h-8 rounded-full ${act.type === 'order' ? 'bg-green-100' : act.type === 'request' ? 'bg-blue-100' : 'bg-gray-100'} flex items-center justify-center">
                    <i class="fas ${act.type === 'order' ? 'fa-shopping-bag' : act.type === 'request' ? 'fa-bell' : 'fa-check'} text-sm ${act.type === 'order' ? 'text-green-600' : act.type === 'request' ? 'text-blue-600' : 'text-gray-600'}"></i>
                  </div>
                  <div class="flex-1"><p class="text-sm font-medium">${act.action}</p><p class="text-xs text-gray-400">${act.time}</p></div>
                </div>
              `).join('')}
            </div>
            <button id="addTestOrderBtn" class="mt-4 w-full bg-orange-50 text-orange-600 py-2 rounded-lg text-sm font-medium hover:bg-orange-100">+ Simulate Test Order</button>
          </div>
        </div>
        
        <!-- Service Requests Alert -->
        ${serviceRequests.length > 0 ? `
          <div class="bg-white rounded-xl shadow-sm p-5">
            <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fas fa-bell text-orange-500"></i> Service Requests</h3>
            <div class="space-y-2">
              ${serviceRequests.map(req => `
                <div class="flex items-center justify-between p-3 bg-orange-50 rounded-lg">
                  <div><i class="fas ${req.type === 'waiter' ? 'fa-user' : req.type === 'water' ? 'fa-tint' : 'fa-receipt'} mr-2"></i> Table ${req.tableNumber} requested ${req.type}</div>
                  <button class="resolveReqBtn bg-green-500 text-white px-3 py-1 rounded text-sm" data-id="${req.id}">Resolve</button>
                </div>
              `).join('')}
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }
  
  function renderOrders() {
    const pendingOrders = orders.filter(o => o.status === 'Pending');
    const preparingOrders = orders.filter(o => o.status === 'Preparing');
    const readyOrders = orders.filter(o => o.status === 'Ready');
    
    const statusColors = {
      Pending: 'bg-yellow-100 text-yellow-700',
      Preparing: 'bg-blue-100 text-blue-700',
      Ready: 'bg-green-100 text-green-700',
      Served: 'bg-gray-100 text-gray-700'
    };
    
    return `
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <div><h1 class="text-2xl font-bold text-gray-800">Live Orders</h1><p class="text-gray-500">Real-time order management</p></div>
          ${!kitchenMode ? `<button id="addTestOrderBtn" class="bg-orange-600 text-white px-4 py-2 rounded-lg text-sm">+ New Test Order</button>` : ''}
        </div>
        
        <!-- Order Sections -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
          <!-- Pending Orders -->
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="bg-yellow-500 text-white p-3"><h3 class="font-bold">Pending (${pendingOrders.length})</h3></div>
            <div class="p-3 space-y-3 max-h-96 overflow-y-auto">
              ${pendingOrders.map(order => `
                <div class="order-card border rounded-lg p-3 hover:shadow-md transition">
                  <div class="flex justify-between items-start mb-2">
                    <div><span class="font-bold text-lg">Table ${order.tableNumber}</span><p class="text-xs text-gray-500">Order #${order.id.slice(-6)}</p></div>
                    <span class="text-xs text-gray-400">${order.elapsed || 'Just now'}</span>
                  </div>
                  <div class="space-y-1 mb-3">
                    ${order.items.map(item => `<div class="flex justify-between text-sm"><span>${item.name} x${item.quantity}</span><span>${formatCurrency(item.price * item.quantity)}</span></div>`).join('')}
                  </div>
                  <div class="flex gap-2">
                    <button class="acceptOrderBtn bg-green-500 text-white px-3 py-1.5 rounded text-sm flex-1" data-id="${order.id}"><i class="fas fa-check mr-1"></i> Accept</button>
                    <button class="declineOrderBtn bg-red-500 text-white px-3 py-1.5 rounded text-sm flex-1" data-id="${order.id}"><i class="fas fa-times mr-1"></i> Decline</button>
                  </div>
                </div>
              `).join('')}
              ${pendingOrders.length === 0 ? '<div class="text-center py-8 text-gray-500">No pending orders</div>' : ''}
            </div>
          </div>
          
          <!-- Preparing Orders -->
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="bg-blue-500 text-white p-3"><h3 class="font-bold">Preparing (${preparingOrders.length})</h3></div>
            <div class="p-3 space-y-3 max-h-96 overflow-y-auto">
              ${preparingOrders.map(order => `
                <div class="order-card border rounded-lg p-3">
                  <div class="flex justify-between mb-2"><span class="font-bold">Table ${order.tableNumber}</span><span class="text-xs text-gray-400">${order.elapsed}</span></div>
                  <div class="text-sm mb-3">${order.items.map(i => i.name).join(', ')}</div>
                  <button class="readyOrderBtn bg-blue-600 text-white px-3 py-1.5 rounded text-sm w-full" data-id="${order.id}"><i class="fas fa-bell mr-1"></i> Mark Ready</button>
                </div>
              `).join('')}
              ${preparingOrders.length === 0 ? '<div class="text-center py-8 text-gray-500">No orders preparing</div>' : ''}
            </div>
          </div>
          
          <!-- Ready Orders -->
          <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="bg-green-500 text-white p-3"><h3 class="font-bold">Ready (${readyOrders.length})</h3></div>
            <div class="p-3 space-y-3 max-h-96 overflow-y-auto">
              ${readyOrders.map(order => `
                <div class="order-card border rounded-lg p-3">
                  <div class="flex justify-between mb-2"><span class="font-bold">Table ${order.tableNumber}</span><span class="text-xs text-gray-400">${order.elapsed}</span></div>
                  <div class="text-sm mb-3">${order.items.map(i => i.name).join(', ')}</div>
                  <button class="serveOrderBtn bg-emerald-600 text-white px-3 py-1.5 rounded text-sm w-full" data-id="${order.id}"><i class="fas fa-check-double mr-1"></i> Serve</button>
                </div>
              `).join('')}
              ${readyOrders.length === 0 ? '<div class="text-center py-8 text-gray-500">No ready orders</div>' : ''}
            </div>
          </div>
        </div>
      </div>
    `;
  }
  
  function renderTableMap() {
    const tableList = getTableStatus();
    
    return `
      <div class="p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Table Map</h1>
        <p class="text-gray-500 mb-6">Visual table management</p>
        
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
          ${tableList.map(table => `
            <div class="bg-white rounded-xl shadow-sm p-4 text-center cursor-pointer hover:shadow-md transition table-card" data-table="${table.id}">
              <div class="w-16 h-16 mx-auto rounded-full flex items-center justify-center mb-3 ${table.status === 'occupied' ? 'bg-orange-100' : 'bg-green-100'}">
                <i class="fas fa-chair text-2xl ${table.status === 'occupied' ? 'text-orange-600' : 'text-green-600'}"></i>
              </div>
              <h3 class="font-bold text-lg">Table ${table.id}</h3>
              <p class="text-xs ${table.status === 'occupied' ? 'text-orange-600' : 'text-green-600'} font-medium">${table.status === 'occupied' ? 'Occupied' : 'Free'}</p>
              ${table.currentOrder ? `<p class="text-xs text-gray-500 mt-1">Order #${table.currentOrder.id.slice(-6)}</p>` : ''}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  function renderMenuManagement() {
    const stats = getStats();
    
    return `
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <div><h1 class="text-2xl font-bold text-gray-800">Menu Management</h1><p class="text-gray-500">${stats.availableItems} items available</p></div>
          <button id="addMenuItemBtn" class="bg-orange-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-plus mr-2"></i>Add Item</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          ${menuItems.map(item => `
            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
              <div class="p-4 border-b flex justify-between items-center">
                <div class="flex items-center gap-2"><span class="text-2xl">${item.image || '🍽️'}</span><h3 class="font-bold">${escapeHtml(item.name)}</h3></div>
                <span class="text-orange-600 font-bold">${formatCurrency(item.price)}</span>
              </div>
              <div class="p-4">
                <p class="text-sm text-gray-500 mb-2">${item.category}</p>
                <div class="flex items-center gap-3 mb-3">
                  <span class="text-xs ${item.veg ? 'text-green-600' : 'text-red-600'}"><i class="fas ${item.veg ? 'fa-leaf' : 'fa-drumstick'}"></i> ${item.veg ? 'Veg' : 'Non-Veg'}</span>
                  <span class="text-xs text-gray-500"><i class="far fa-clock"></i> ${item.prepTime} min</span>
                  <span class="text-xs ${item.available ? 'text-green-600' : 'text-red-600'}">${item.available ? 'In Stock' : 'Out of Stock'}</span>
                </div>
                <div class="flex gap-2">
                  <button class="editMenuItemBtn flex-1 bg-gray-100 text-gray-700 py-2 rounded text-sm" data-id="${item.id}">Edit</button>
                  <button class="toggleAvailBtn flex-1 ${item.available ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'} py-2 rounded text-sm" data-id="${item.id}" data-available="${item.available}">${item.available ? 'Block' : 'Unblock'}</button>
                  <button class="deleteMenuItemBtn bg-red-100 text-red-600 px-3 py-2 rounded text-sm" data-id="${item.id}" data-name="${escapeHtml(item.name)}"><i class="fas fa-trash"></i></button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  function renderAnalytics() {
    return `
      <div class="p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Analytics</h1>
        <p class="text-gray-500 mb-6">Sales insights and performance metrics</p>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl shadow-sm p-5">
            <h3 class="font-bold mb-4">Most Ordered Items</h3>
            <div class="space-y-3">
              <div><div class="flex justify-between mb-1"><span>Paneer Tikka</span><span>45 orders</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-orange-500 h-2 rounded-full" style="width: 75%"></div></div></div>
              <div><div class="flex justify-between mb-1"><span>Chicken Biryani</span><span>38 orders</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-orange-500 h-2 rounded-full" style="width: 63%"></div></div></div>
              <div><div class="flex justify-between mb-1"><span>Butter Naan</span><span>30 orders</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-orange-500 h-2 rounded-full" style="width: 50%"></div></div></div>
            </div>
          </div>
          
          <div class="bg-white rounded-xl shadow-sm p-5">
            <h3 class="font-bold mb-4">Peak Hours Analysis</h3>
            <div class="space-y-3">
              <div><div class="flex justify-between mb-1"><span>7 PM - 8 PM</span><span>32 orders</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-purple-500 h-2 rounded-full" style="width: 100%"></div></div></div>
              <div><div class="flex justify-between mb-1"><span>8 PM - 9 PM</span><span>28 orders</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-purple-500 h-2 rounded-full" style="width: 87%"></div></div></div>
              <div><div class="flex justify-between mb-1"><span>1 PM - 2 PM</span><span>20 orders</span></div><div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-purple-500 h-2 rounded-full" style="width: 62%"></div></div></div>
            </div>
          </div>
        </div>
      </div>
    `;
  }
  
  function renderLogs() {
    return `
      <div class="p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Activity Logs</h1>
        <p class="text-gray-500 mb-6">System activity tracking</p>
        
        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full">
              <thead class="bg-gray-50 border-b">
                <tr><th class="px-4 py-3 text-left text-sm font-medium">Timestamp</th><th class="px-4 py-3 text-left text-sm font-medium">Action</th><th class="px-4 py-3 text-left text-sm font-medium">Details</th><th class="px-4 py-3 text-left text-sm font-medium">User</th></tr>
              </thead>
              <tbody>
                ${activityLogs.slice(0, 50).map(log => `
                  <tr class="border-b hover:bg-gray-50">
                    <td class="px-4 py-2 text-sm">${new Date(log.timestamp).toLocaleString()}</td>
                    <td class="px-4 py-2 text-sm font-medium">${log.action}</td>
                    <td class="px-4 py-2 text-sm text-gray-600">${typeof log.details === 'object' ? JSON.stringify(log.details) : log.details}</td>
                    <td class="px-4 py-2 text-sm">${log.user}</td>
                  </tr>
                `).join('')}
                ${activityLogs.length === 0 ? '<tr><td colspan="4" class="text-center py-8 text-gray-500">No logs yet</td></tr>' : ''}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    `;
  }
  
  function renderMainContent() {
    switch(currentView) {
      case 'dashboard': return renderDashboard();
      case 'orders': return renderOrders();
      case 'tables': return renderTableMap();
      case 'menu': return renderMenuManagement();
      case 'analytics': return renderAnalytics();
      case 'logs': return renderLogs();
      default: return renderDashboard();
    }
  }
  
  function render() {
    const root = document.getElementById('admin-dashboard');
    if (!root) return;
    
    if (!isLoggedIn) {
      root.innerHTML = renderLogin();
      document.getElementById('loginBtn')?.addEventListener('click', () => {
        const email = document.getElementById('loginEmail')?.value;
        const pwd = document.getElementById('loginPassword')?.value;
        login(email, pwd);
      });
      return;
    }
    
    if (darkMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
    
    if (kitchenMode) document.body.classList.add('kitchen-mode');
    else document.body.classList.remove('kitchen-mode');
    
    root.innerHTML = `
      <div class="min-h-screen bg-gray-50">
        ${renderSidebar()}
        <div class="ml-64">${renderMainContent()}</div>
      </div>
    `;
    
    // Attach events
    document.querySelectorAll('.sidebar-nav').forEach(btn => {
      btn.addEventListener('click', () => {
        currentView = btn.dataset.view;
        render();
      });
    });
    
    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
    document.getElementById('kitchenModeToggle')?.addEventListener('click', toggleKitchenMode);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    
    document.querySelectorAll('.acceptOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Preparing'));
    });
    document.querySelectorAll('.declineOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (confirm('Decline this order?')) updateOrderStatus(btn.dataset.id, 'Declined');
      });
    });
    document.querySelectorAll('.readyOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Ready'));
    });
    document.querySelectorAll('.serveOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Served'));
    });
    
    document.querySelectorAll('.resolveReqBtn').forEach(btn => {
      btn.addEventListener('click', () => resolveServiceRequest(parseInt(btn.dataset.id)));
    });
    
    document.getElementById('addTestOrderBtn')?.addEventListener('click', addTestOrder);
    document.getElementById('addMenuItemBtn')?.addEventListener('click', () => {
      const name = prompt('Item name:');
      const price = parseFloat(prompt('Price:'));
      if (name && price) addMenuItem({ name, price, category: 'Starters', veg: true, available: true, prepTime: 10, image: '🍽️' });
    });
    
    document.querySelectorAll('.editMenuItemBtn').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = menuItems.find(i => i.id == btn.dataset.id);
        const newPrice = prompt('New price:', item.price);
        if (newPrice) updateMenuItem(item.id, { price: parseFloat(newPrice) });
      });
    });
    document.querySelectorAll('.toggleAvailBtn').forEach(btn => {
      btn.addEventListener('click', () => toggleAvailability(btn.dataset.id, btn.dataset.available === 'true'));
    });
    document.querySelectorAll('.deleteMenuItemBtn').forEach(btn => {
      btn.addEventListener('click', () => deleteMenuItem(btn.dataset.id, btn.dataset.name));
    });
  }
  
  // Initialize
  loadLogs();
  addLog('APP_STARTED', { version: '2.0' });
  render();
</script>
</body>
</html>
