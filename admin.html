  function showNotification(message, type = 'success') {
    const toast = document.createElement('div');
    const colors = { success: '#22c55e', error: '#ef4444', info: '#3b82f6', warning: '#f59e0b' };
    toast.className = `toast px-5 py-3 rounded-lg shadow-lg text-white font-medium text-sm flex items-center gap-2`;

  function formatCurrency(amount) { return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(amount); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      if (!file) { resolve("https://placehold.co/400x200/e2e8f0/475569?text=No+Image"); return; }
      if (!file.type.startsWith('image/')) { resolve("https://placehold.co/400x200/e2e8f0/475569?text=Not+an+Image"); return; }
      isCompressing = true; compressProgress = 0; render();
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          compressProgress = 30; render();
          let width = img.width, height = img.height;
          if (width > MAX_IMAGE_DIMENSION || height > MAX_IMAGE_DIMENSION) {
            if (width > height) { height = (height * MAX_IMAGE_DIMENSION) / width; width = MAX_IMAGE_DIMENSION; }
            else { width = (width * MAX_IMAGE_DIMENSION) / height; height = MAX_IMAGE_DIMENSION; }
          }
          compressProgress = 60; render();
          const canvas = document.createElement('canvas');
          canvas.width = width; canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          let quality = 0.8;
          let result = canvas.toDataURL('image/jpeg', quality);
          while (result.length > MAX_IMAGE_SIZE_KB * 1024 && quality > 0.1) { quality -= 0.1; result = canvas.toDataURL('image/jpeg', quality); }
          compressProgress = 100; render();
          setTimeout(() => { isCompressing = false; compressProgress = 0; resolve(result); }, 500);
        };
        img.onerror = () => { isCompressing = false; resolve("https://placehold.co/400x200/e2e8f0/475569?text=Invalid+Image"); };
      };
      reader.onerror = () => { isCompressing = false; reject("Failed to read file"); };
    });
  }
  
  async function createRestaurantProfile(userId, name, address, phone) {
    try {
      const docRef = await addDoc(collection(db, "restaurants"), { userId, name, address, phone, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
      return { id: docRef.id };
    } catch (error) { console.error(error); throw error; }
  }
  
  async function getRestaurantProfile(userId) {
    try {
      const q = query(collection(db, "restaurants"), where("userId", "==", userId));
      const snapshot = await getDocs(q);
      if (!snapshot.empty) return { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
      return null;
    } catch (error) { return null; }
  }
  
  function listenToMenu() {
    if (!isLoggedIn || !currentUser) return;
    isLoading = true; render();
    const menuQuery = query(collection(db, "menu"), where("restaurantId", "==", currentUser.uid));
    onSnapshot(menuQuery, (snapshot) => {
      menuItems = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        menuItems.push({ id: doc.id, name: data.name || '', price: data.price || 0, category: data.category || '', description: data.description || '', image: data.image || "https://placehold.co/400x200/e2e8f0/475569?text=No+Image", available: data.available !== false, rating: data.rating || 4.5, veg: data.veg !== undefined ? data.veg : true, popular: data.popular || false });
      });
      isLoading = false;
      if (currentView === 'menu') render();
    }, (error) => { isLoading = false; showNotification("Error loading menu: " + error.message, "error"); });
  }
  
  function listenToOrders() {
    if (!isLoggedIn || !currentUser) return;
    const ordersQuery = query(collection(db, "orders"), where("restaurantId", "==", currentUser.uid));
    onSnapshot(ordersQuery, (snapshot) => {
      orders = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        orders.push({ id: doc.id, tableNumber: data.tableNumber, billNumber: data.billNumber || '0001', items: data.items || [], subtotal: data.subtotal, cgst: data.cgst, sgst: data.sgst, serviceCharge: data.serviceCharge, totalPrice: data.totalPrice, status: data.status || 'Pending', timestamp: data.timestamp, restaurantName: data.restaurantName || userRestaurantData?.name || 'QR Dine' });
      });
      orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      if (currentView === 'dashboard' || currentView === 'orders' || currentView === 'analytics') render();
    });
  }

      await addDoc(collection(db, "menu"), { restaurantId: currentUser.uid, name: itemData.name, price: parseFloat(itemData.price), category: itemData.category, description: itemData.description || '', image: imageData, available: true, rating: 4.5, veg: itemData.veg, popular: false, createdAt: serverTimestamp() });

    } catch (error) { showNotification("Error: " + error.message, 'error'); return false; }

      isLoggedIn = true;
      userRestaurantData = await getRestaurantProfile(currentUser.uid);
      if (userRestaurantData) {
        restaurantSettings.name = userRestaurantData.name || restaurantSettings.name;
        restaurantSettings.address = userRestaurantData.address || restaurantSettings.address;
        restaurantSettings.phone = userRestaurantData.phone || restaurantSettings.phone;

      showNotification(`Welcome back!`, 'success');

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      await updateProfile(currentUser, { displayName: name });

      restaurantSettings.address = address;
      restaurantSettings.phone = phone;

      await initializeDefaultMenuForRestaurant();
      listenToMenu();
      listenToOrders();
      currentView = 'dashboard';
      render();
      return true;
    } catch (error) { showNotification(error.message, 'error'); return false; }
  }
  
  async function logoutUser() {
    try { await signOut(auth); currentUser = null; isLoggedIn = false; menuItems = []; orders = []; showNotification('Logged out', 'info'); render(); } 
    catch (error) { showNotification("Error logging out", 'error'); }
  }
  
  function checkAuthState() {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        isLoggedIn = true;
        userRestaurantData = await getRestaurantProfile(currentUser.uid);
        if (userRestaurantData) {
          restaurantSettings.name = userRestaurantData.name || restaurantSettings.name;
          restaurantSettings.address = userRestaurantData.address || restaurantSettings.address;
          restaurantSettings.phone = userRestaurantData.phone || restaurantSettings.phone;
        }
        await initializeDefaultMenuForRestaurant();
        listenToMenu();
        listenToOrders();
        currentView = 'dashboard';
        render();
      } else { currentUser = null; isLoggedIn = false; render(); }
    });
  }
  
  function getStats() {
    const totalOrders = orders.length;
    const pendingOrders = orders.filter(o => o.status === 'Pending').length;
    const totalRevenue = orders.filter(o => o.status !== 'Declined').reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    const availableItems = menuItems.filter(i => i.available).length;
    return { totalOrders, pendingOrders, totalRevenue, availableItems };
  }
  
  function getAnalytics() {
    const monthlySales = {};
    const categorySales = {};
    orders.forEach(order => {
      if (order.status !== 'Declined') {
        const date = new Date(order.timestamp);
        const monthYear = `${date.toLocaleString('default', { month: 'short' })} ${date.getFullYear()}`;
        monthlySales[monthYear] = (monthlySales[monthYear] || 0) + order.totalPrice;
        order.items.forEach(item => {
          const foundItem = menuItems.find(i => i.name === item.name);
          const category = foundItem?.category || 'Other';
          categorySales[category] = (categorySales[category] || 0) + (item.price * item.quantity);
        });
      }
    });
    const sortedMonths = Object.keys(monthlySales).slice(-6);
    const monthlyData = sortedMonths.map(m => monthlySales[m]);
    return { monthlyLabels: sortedMonths, monthlyData, categorySales };
  }

    return `<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-amber-100 p-4"><div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl"><div class="text-center mb-6"><div class="inline-block bg-orange-100 rounded-full p-4 mb-4"><i class="fas fa-utensils text-5xl text-orange-600"></i></div><h2 class="text-2xl font-bold">Multi-Restaurant Admin</h2><p class="text-gray-500 text-sm">Each restaurant has its own private data</p></div><div id="loginForm"><div class="space-y-4"><input type="email" id="loginEmail" class="w-full border rounded-lg px-4 py-2" placeholder="Email"><input type="password" id="loginPassword" class="w-full border rounded-lg px-4 py-2" placeholder="Password"><button id="loginBtn" class="w-full bg-orange-600 text-white py-2 rounded-lg font-semibold">Login</button><p class="text-center text-sm">New restaurant? <button id="showRegisterBtn" class="text-orange-600">Register</button></p></div></div><div id="registerForm" class="hidden"><div class="space-y-4"><input type="text" id="restaurantName" class="w-full border rounded-lg px-4 py-2" placeholder="Restaurant Name"><input type="text" id="ownerName" class="w-full border rounded-lg px-4 py-2" placeholder="Owner Name"><input type="email" id="registerEmail" class="w-full border rounded-lg px-4 py-2" placeholder="Email"><input type="password" id="registerPassword" class="w-full border rounded-lg px-4 py-2" placeholder="Password"><textarea id="restaurantAddress" rows="2" class="w-full border rounded-lg px-4 py-2" placeholder="Address"></textarea><input type="tel" id="restaurantPhone" class="w-full border rounded-lg px-4 py-2" placeholder="Phone"><button id="registerBtn" class="w-full bg-orange-600 text-white py-2 rounded-lg font-semibold">Register</button><p class="text-center text-sm">Already registered? <button id="showLoginBtn" class="text-orange-600">Login</button></p></div></div></div></div>`;
  }
  
  function renderDashboard() {
    const stats = getStats();
    return `<div class="p-6"><div class="bg-white rounded-2xl shadow-sm p-6 mb-6 flex justify-between items-center flex-wrap gap-4"><div><h1 class="text-2xl font-bold">${restaurantSettings.name} Dashboard</h1><p class="text-gray-500">Welcome, ${currentUser?.displayName || currentUser?.email}</p></div><div class="flex gap-3"><button id="taxSettingsBtn" class="bg-purple-500 text-white px-4 py-2 rounded-lg"><i class="fas fa-percent"></i> Tax</button><button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded-lg"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div><div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-6"><div class="bg-white rounded-xl p-5"><div class="flex justify-between"><div><p class="text-gray-500">Total Orders</p><p class="text-3xl font-bold">${stats.totalOrders}</p></div><i class="fas fa-receipt text-4xl text-orange-300"></i></div></div><div class="bg-white rounded-xl p-5"><div class="flex justify-between"><div><p class="text-gray-500">Pending</p><p class="text-3xl font-bold text-yellow-600">${stats.pendingOrders}</p></div><i class="fas fa-clock text-4xl text-yellow-300"></i></div></div><div class="bg-white rounded-xl p-5"><div class="flex justify-between"><div><p class="text-gray-500">Revenue</p><p class="text-3xl font-bold text-green-600">${formatCurrency(stats.totalRevenue)}</p></div><i class="fas fa-rupee-sign text-4xl text-green-300"></i></div></div><div class="bg-white rounded-xl p-5"><div class="flex justify-between"><div><p class="text-gray-500">Menu Items</p><p class="text-3xl font-bold">${stats.availableItems}</p></div><i class="fas fa-utensils text-4xl text-orange-300"></i></div></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div class="bg-gradient-to-r from-orange-500 to-orange-600 rounded-xl p-6 text-white cursor-pointer" id="goToMenuBtn"><h3 class="text-xl font-bold">🍽️ My Menu</h3><p class="text-sm mb-4">Manage menu items</p><div class="inline-block bg-white text-orange-600 px-4 py-2 rounded-lg">Manage Menu</div></div><div class="bg-gradient-to-r from-blue-500 to-blue-600 rounded-xl p-6 text-white cursor-pointer" id="goToOrdersBtn"><h3 class="text-xl font-bold">📦 My Orders</h3><p class="text-sm mb-4">Track orders</p><div class="inline-block bg-white text-blue-600 px-4 py-2 rounded-lg">View Orders</div></div></div><div class="bg-white rounded-xl p-6"><h2 class="font-bold mb-4">📋 Recent Orders</h2>${orders.slice(0,5).map(order => `<div class="border rounded-lg p-4 mb-2 flex justify-between items-center flex-wrap gap-2"><div><p class="font-semibold">Bill #${order.billNumber}</p><p class="text-sm">Table ${order.tableNumber}</p></div><div><span class="px-3 py-1 rounded-full text-xs ${order.status === 'Pending' ? 'bg-yellow-100' : order.status === 'Accepted' ? 'bg-blue-100' : order.status === 'Preparing' ? 'bg-purple-100' : order.status === 'Ready' ? 'bg-green-100' : 'bg-emerald-100'}">${order.status}</span></div><div class="flex gap-2">${order.status === 'Pending' ? `<button class="acceptOrderBtn bg-green-500 text-white px-3 py-1 rounded text-xs" data-id="${order.id}">Accept</button>` : ''}<button class="printOrderBtn bg-gray-500 text-white px-3 py-1 rounded text-xs" data-order='${JSON.stringify(order)}'><i class="fas fa-print"></i> Print</button></div></div>`).join('')}</div></div>`;
  }
  
  function renderMenuManagement() {
    if (isLoading) return `<div class="min-h-screen flex items-center justify-center"><div class="loading-spinner mx-auto"></div><p class="mt-4">Loading menu...</p></div>`;
    return `<div class="p-6"><div class="bg-white rounded-2xl shadow-sm p-6 mb-6 flex justify-between items-center flex-wrap gap-4"><div><button id="backToDashboard" class="text-gray-600 mr-4"><i class="fas fa-arrow-left"></i> Back</button><h1 class="text-2xl font-bold inline-block">My Menu</h1></div><button id="addItemBtn" class="bg-orange-600 text-white px-5 py-2 rounded-lg"><i class="fas fa-plus"></i> Add Item</button></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">${menuItems.map(item => `<div class="bg-white rounded-xl shadow-sm overflow-hidden"><div class="relative h-48 bg-gray-100"><img src="${item.image}" class="w-full h-48 object-cover"><div class="absolute top-2 right-2"><span class="px-2 py-1 rounded-full text-xs ${item.available ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${item.available ? 'Available' : 'Unavailable'}</span></div></div><div class="p-4"><div class="flex justify-between"><div><div class="flex items-center gap-2"><span class="veg-dot ${item.veg ? 'green' : 'red'}"></span><h3 class="font-bold">${escapeHtml(item.name)}</h3></div><p class="text-xs text-gray-500">${item.category}</p></div><p class="text-orange-600 font-bold">${formatCurrency(item.price)}</p></div><p class="text-gray-500 text-sm mb-4">${escapeHtml(item.description || 'No description')}</p><div class="flex gap-2"><button class="editItemBtn flex-1 bg-gray-100 py-2 rounded-lg text-sm" data-id="${item.id}"><i class="fas fa-edit"></i> Edit</button><button class="toggleAvailBtn flex-1 ${item.available ? 'bg-yellow-100' : 'bg-green-100'} py-2 rounded-lg text-sm" data-id="${item.id}" data-available="${item.available}"><i class="fas ${item.available ? 'fa-ban' : 'fa-check'}"></i> ${item.available ? 'Block' : 'Unblock'}</button><button class="deleteItemBtn bg-red-100 text-red-600 px-3 py-2 rounded-lg text-sm" data-id="${item.id}" data-name="${escapeHtml(item.name)}"><i class="fas fa-trash"></i></button></div></div></div>`).join('')}</div></div>`;
  }
  
  function renderOrdersManagement() {
    const tabs = ['pending', 'accepted', 'preparing', 'ready', 'completed', 'declined'];
    const statusMap = { pending: 'Pending', accepted: 'Accepted', preparing: 'Preparing', ready: 'Ready', completed: 'Served', declined: 'Declined' };
    let filtered = orders.filter(o => o.status === statusMap[currentTab]);
    return `<div class="p-6"><div class="bg-white rounded-2xl shadow-sm p-6 mb-6"><button id="backToDashboardOrders" class="text-gray-600 mr-4"><i class="fas fa-arrow-left"></i> Back</button><h1 class="text-2xl font-bold inline-block">My Orders</h1></div><div class="flex gap-2 mb-6 border-b overflow-x-auto pb-2">${tabs.map(tab => `<button class="order-tab px-4 py-2 font-medium text-sm ${currentTab === tab ? 'text-orange-600 border-b-2 border-orange-600' : 'text-gray-500'}" data-tab="${tab}">${tab.charAt(0).toUpperCase() + tab.slice(1)} (${orders.filter(o => o.status === statusMap[tab]).length})</button>`).join('')}</div><div class="space-y-4">${filtered.map(order => `<div class="bg-white rounded-xl shadow-sm p-5"><div class="flex justify-between items-start mb-4 flex-wrap gap-3"><div><h3 class="font-bold">Bill #${order.billNumber}</h3><p class="text-sm text-gray-500">Table ${order.tableNumber} • ${new Date(order.timestamp).toLocaleString()}</p></div><div class="text-right"><p class="text-2xl font-bold text-orange-600">${formatCurrency(order.totalPrice)}</p><span class="px-3 py-1 rounded-full text-xs ${order.status === 'Pending' ? 'bg-yellow-100' : order.status === 'Accepted' ? 'bg-blue-100' : order.status === 'Preparing' ? 'bg-purple-100' : order.status === 'Ready' ? 'bg-green-100' : order.status === 'Served' ? 'bg-emerald-100' : 'bg-red-100'}">${order.status}</span></div></div><div class="border-t pt-3 mb-3">${order.items.map(item => `<div class="flex justify-between text-sm"><span>${escapeHtml(item.name)} x${item.quantity}</span><span>${formatCurrency(item.price * item.quantity)}</span></div>`).join('')}</div><div class="flex flex-wrap gap-2">${order.status === 'Pending' ? `<button class="acceptOrderBtn bg-green-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}">Accept</button><button class="declineOrderBtn bg-red-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}">Decline</button>` : ''}${order.status === 'Accepted' ? `<button class="prepareOrderBtn bg-purple-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}">Start Preparing</button>` : ''}${order.status === 'Preparing' ? `<button class="readyOrderBtn bg-blue-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}">Mark Ready</button>` : ''}${order.status === 'Ready' ? `<button class="serveOrderBtn bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}">Serve Order</button>` : ''}<button class="printOrderBtn bg-gray-500 text-white px-4 py-2 rounded-lg text-sm" data-order='${JSON.stringify(order)}'><i class="fas fa-print"></i> Print Bill</button>${order.status === 'Declined' ? `<button class="deleteOrderBtn bg-red-600 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}">Delete</button>` : ''}</div></div>`).join('')}</div></div>`;
  }
  
  function renderAnalytics() {
    const analytics = getAnalytics();
    const totalRevenue = orders.filter(o => o.status !== 'Declined').reduce((sum, o) => sum + o.totalPrice, 0);
    const avgOrder = orders.filter(o => o.status !== 'Declined').length ? totalRevenue / orders.filter(o => o.status !== 'Declined').length : 0;
    const categoryLabels = Object.keys(analytics.categorySales);
    const categoryData = Object.values(analytics.categorySales);
    
    setTimeout(() => {
      const barCtx = document.getElementById('monthlySalesChart')?.getContext('2d');
      if (barCtx) new Chart(barCtx, { type: 'bar', data: { labels: analytics.monthlyLabels, datasets: [{ label: 'Sales (₹)', data: analytics.monthlyData, backgroundColor: '#f97316', borderRadius: 8 }] }, options: { responsive: true, maintainAspectRatio: true } });
      const pieCtx = document.getElementById('categoryPieChart')?.getContext('2d');
      if (pieCtx) new Chart(pieCtx, { type: 'pie', data: { labels: categoryLabels, datasets: [{ data: categoryData, backgroundColor: ['#f97316', '#22c55e', '#3b82f6', '#a855f7', '#eab308', '#ef4444', '#06b6d4', '#8b5cf6', '#ec4899'] }] }, options: { responsive: true, plugins: { legend: { position: 'bottom' } } } });
    }, 100);
    
    return `<div class="p-8"><div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8"><div class="bg-white rounded-xl p-6"><p class="text-gray-500 text-sm">Total Revenue</p><p class="text-3xl font-bold text-green-600">${formatCurrency(totalRevenue)}</p></div><div class="bg-white rounded-xl p-6"><p class="text-gray-500 text-sm">Average Order Value</p><p class="text-3xl font-bold text-orange-600">${formatCurrency(avgOrder)}</p></div><div class="bg-white rounded-xl p-6"><p class="text-gray-500 text-sm">Total Orders</p><p class="text-3xl font-bold">${orders.filter(o => o.status !== 'Declined').length}</p></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="bg-white rounded-xl p-6"><h3 class="font-bold text-lg mb-4">📊 Monthly Sales Trend</h3><canvas id="monthlySalesChart" height="250"></canvas></div><div class="bg-white rounded-xl p-6"><h3 class="font-bold text-lg mb-4">🥧 Sales by Category</h3><canvas id="categoryPieChart" height="250"></canvas></div></div></div>`;
  }
  
  function renderSettings() {
    return `<div class="p-8"><div class="bg-white rounded-xl shadow-sm p-6 max-w-3xl mx-auto"><h3 class="font-bold text-xl mb-6">⚙️ Restaurant Settings</h3><div class="space-y-4"><div><label class="block text-sm font-medium mb-1">Restaurant Name</label><input type="text" id="restoName" value="${restaurantSettings.name}" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">Address</label><textarea id="restoAddress" rows="2" class="w-full border rounded-lg px-3 py-2">${restaurantSettings.address}</textarea></div><div><label class="block text-sm font-medium mb-1">Phone Number</label><input type="text" id="restoPhone" value="${restaurantSettings.phone}" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">Email</label><input type="email" id="restoEmail" value="${restaurantSettings.email}" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">GST Number</label><input type="text" id="restoGST" value="${restaurantSettings.gstin}" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">FSSAI Number</label><input type="text" id="restoFSSAI" value="${restaurantSettings.fssai}" class="w-full border rounded-lg px-3 py-2"></div><button onclick="window.saveSettings()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold mt-4">Save Settings</button></div></div></div>`;
  }
  
  function renderTaxModal() {
    if (!showTaxModal) return '';
    return `<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" id="taxModalOverlay"><div class="bg-white rounded-2xl max-w-md w-full p-6"><div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold"><i class="fas fa-percent text-orange-600"></i> Tax Settings</h2><button id="closeTaxModal" class="text-gray-400 text-2xl">&times;</button></div><div class="space-y-4"><label class="flex justify-between py-2"><span>CGST (2.5%)</span><input type="checkbox" id="cgstEnabled" ${TAX_CONFIG.cgst.enabled ? 'checked' : ''}></label><label class="flex justify-between py-2"><span>SGST (2.5%)</span><input type="checkbox" id="sgstEnabled" ${TAX_CONFIG.sgst.enabled ? 'checked' : ''}></label><label class="flex justify-between py-2"><span>Service Charge (5%)</span><input type="checkbox" id="serviceChargeEnabled" ${TAX_CONFIG.serviceCharge.enabled ? 'checked' : ''}></label><label class="flex justify-between py-2"><span>Round Off</span><input type="checkbox" id="roundOffEnabled" ${TAX_CONFIG.roundOff ? 'checked' : ''}></label></div><div class="flex gap-3 mt-6"><button id="saveTaxBtn" class="flex-1 bg-orange-600 text-white py-2 rounded-lg">Save</button><button id="cancelTaxBtn" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button></div></div></div>`;
  }
  
  function renderAddEditModal() {
    if (!showModal) return '';
    const isEditing = editingItem !== null;
    const item = editingItem || {};
    return `<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" id="modalOverlay"><div class="bg-white rounded-2xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto"><h2 class="text-xl font-bold mb-4">${isEditing ? '✏️ Edit Item' : '➕ Add Item'}</h2><div class="space-y-3"><input type="text" id="itemName" placeholder="Item Name" class="w-full border rounded-lg px-3 py-2" value="${escapeHtml(item.name || '')}"><input type="number" id="itemPrice" placeholder="Price" class="w-full border rounded-lg px-3 py-2" value="${item.price || ''}"><select id="itemCategory" class="w-full border rounded-lg px-3 py-2">${categories.map(c => `<option value="${c}" ${item.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select><textarea id="itemDescription" rows="2" placeholder="Description" class="w-full border rounded-lg px-3 py-2">${escapeHtml(item.description || '')}</textarea><div class="flex gap-4"><label class="flex items-center gap-2"><input type="radio" name="foodType" value="veg" ${(item.veg !== undefined ? item.veg : true) ? 'checked' : ''}> <span class="veg-dot green"></span> Vegetarian</label><label class="flex items-center gap-2"><input type="radio" name="foodType" value="nonveg" ${(item.veg !== undefined ? !item.veg : false) ? 'checked' : ''}> <span class="veg-dot red"></span> Non-Vegetarian</label></div><div><label class="block text-sm font-medium mb-1">Image</label><input type="file" id="itemFile" accept="image/*" class="w-full border rounded-lg px-3 py-2"><div class="mt-2"><img id="filePreview" src="${item.image || ''}" class="image-preview ${item.image ? '' : 'hidden'}"></div>${isCompressing ? `<div class="mt-2"><div class="bg-gray-200 rounded-full h-2"><div class="bg-orange-600 h-2 rounded-full compress-progress" style="width: ${compressProgress}%"></div></div><p class="text-xs">Compressing: ${compressProgress}%</p></div>` : ''}</div></div><div class="flex gap-3 mt-6"><button id="saveItemBtn" class="flex-1 bg-orange-600 text-white py-2 rounded-lg font-semibold">${isEditing ? 'Update' : 'Add'}</button><button id="cancelModalBtn" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button></div></div></div>`;
  }
  
  function render() {
    const root = document.getElementById('admin-root');
    if (!root) return;
    if (!isLoggedIn) { root.innerHTML = renderLogin(); attachLoginEvents(); return; }
    const sidebar = `<div class="fixed left-0 top-0 h-full w-64 bg-white shadow-xl z-20"><div class="p-6 border-b"><h1 class="font-bold text-xl">QR<span class="text-orange-500">Dine</span></h1><p class="text-xs text-gray-500">Admin Portal</p></div><nav class="p-4 space-y-1"><div onclick="window.setView('dashboard')" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl ${currentView === 'dashboard' ? 'active' : ''}"><i class="fas fa-chart-line w-5"></i>Dashboard</div><div onclick="window.setView('orders')" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl ${currentView === 'orders' ? 'active' : ''}"><i class="fas fa-clipboard-list w-5"></i>Orders</div><div onclick="window.setView('menu')" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl ${currentView === 'menu' ? 'active' : ''}"><i class="fas fa-utensils w-5"></i>Menu</div><div onclick="window.setView('analytics')" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl ${currentView === 'analytics' ? 'active' : ''}"><i class="fas fa-chart-bar w-5"></i>Analytics</div><div onclick="window.setView('settings')" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl ${currentView === 'settings' ? 'active' : ''}"><i class="fas fa-cog w-5"></i>Settings</div></nav></div>`;
    let main = '';
    if (currentView === 'dashboard') main = renderDashboard();
    else if (currentView === 'orders') main = renderOrdersManagement();
    else if (currentView === 'menu') main = renderMenuManagement();
    else if (currentView === 'analytics') main = renderAnalytics();
    else main = renderSettings();
    root.innerHTML = `<div class="min-h-screen bg-gray-50"><div class="ml-64"><div class="bg-white shadow-sm px-8 py-4 flex justify-between items-center"><div><h2 class="text-xl font-bold capitalize">${currentView}</h2><p class="text-sm text-gray-500">${restaurantSettings.name}</p></div><button onclick="window.logout()" class="bg-red-500 text-white px-4 py-2 rounded-lg">Logout</button></div>${main}</div>${sidebar}${renderAddEditModal()}${renderTaxModal()}</div>`;
    attachEvents();
  }
  
  function attachLoginEvents() {
    document.getElementById('loginBtn')?.addEventListener('click', () => { const email = document.getElementById('loginEmail')?.value; const password = document.getElementById('loginPassword')?.value; if(email && password) loginUser(email, password); });
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); });
    document.getElementById('registerBtn')?.addEventListener('click', () => { const restaurantName = document.getElementById('restaurantName')?.value; const ownerName = document.getElementById('ownerName')?.value; const email = document.getElementById('registerEmail')?.value; const password = document.getElementById('registerPassword')?.value; const address = document.getElementById('restaurantAddress')?.value; const phone = document.getElementById('restaurantPhone')?.value; if(restaurantName && ownerName && email && password) registerUser(email, password, ownerName, restaurantName, address, phone); });
  }
  
  function attachEvents() {
    document.getElementById('goToMenuBtn')?.addEventListener('click', () => { currentView = 'menu'; render(); });
    document.getElementById('goToOrdersBtn')?.addEventListener('click', () => { currentView = 'orders'; currentTab = 'pending'; render(); });
    document.getElementById('backToDashboard')?.addEventListener('click', () => { currentView = 'dashboard'; render(); });
    document.getElementById('backToDashboardOrders')?.addEventListener('click', () => { currentView = 'dashboard'; render(); });
    document.getElementById('addItemBtn')?.addEventListener('click', () => { editingItem = null; selectedFile = null; imagePreviewUrl = null; showModal = true; render(); });
    document.getElementById('taxSettingsBtn')?.addEventListener('click', () => { showTaxModal = true; render(); });
    document.getElementById('itemFile')?.addEventListener('change', handleFileSelect);
    document.querySelectorAll('.editItemBtn').forEach(btn => { btn.addEventListener('click', () => { editingItem = menuItems.find(i => i.id === btn.dataset.id); selectedFile = null; showModal = true; render(); }); });
    document.querySelectorAll('.toggleAvailBtn').forEach(btn => { btn.addEventListener('click', () => { toggleAvailability(btn.dataset.id, btn.dataset.available === 'true'); }); });
    document.querySelectorAll('.deleteItemBtn').forEach(btn => { btn.addEventListener('click', () => { deleteMenuItem(btn.dataset.id, btn.dataset.name); }); });
    document.querySelectorAll('.acceptOrderBtn').forEach(btn => { btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Accepted'); }); });
    document.querySelectorAll('.declineOrderBtn').forEach(btn => { btn.addEventListener('click', () => { if(confirm('Decline this order?')) updateOrderStatus(btn.dataset.id, 'Declined'); }); });
    document.querySelectorAll('.prepareOrderBtn').forEach(btn => { btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Preparing'); }); });
    document.querySelectorAll('.readyOrderBtn').forEach(btn => { btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Ready'); }); });
    document.querySelectorAll('.serveOrderBtn').forEach(btn => { btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Served'); }); });
    document.querySelectorAll('.deleteOrderBtn').forEach(btn => { btn.addEventListener('click', () => { deleteOrder(btn.dataset.id); }); });
    document.querySelectorAll('.printOrderBtn').forEach(btn => { btn.addEventListener('click', () => { const order = JSON.parse(btn.dataset.order); printBill(order); }); });
    document.querySelectorAll('.order-tab').forEach(tab => { tab.addEventListener('click', () => { currentTab = tab.dataset.tab; render(); }); });
    const closeModal = () => { showModal = false; editingItem = null; selectedFile = null; imagePreviewUrl = null; isCompressing = false; compressProgress = 0; render(); };
    const closeTaxModal = () => { showTaxModal = false; render(); };
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('cancelModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('modalOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });
    document.getElementById('closeTaxModal')?.addEventListener('click', closeTaxModal);
    document.getElementById('cancelTaxBtn')?.addEventListener('click', closeTaxModal);
    document.getElementById('taxModalOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'taxModalOverlay') closeTaxModal(); });
    document.getElementById('saveTaxBtn')?.addEventListener('click', () => {
      TAX_CONFIG.cgst.enabled = document.getElementById('cgstEnabled')?.checked || false;
      TAX_CONFIG.sgst.enabled = document.getElementById('sgstEnabled')?.checked || false;
      TAX_CONFIG.serviceCharge.enabled = document.getElementById('serviceChargeEnabled')?.checked || false;
      TAX_CONFIG.roundOff = document.getElementById('roundOffEnabled')?.checked || false;
      showNotification('Tax settings saved!', 'success');
      showTaxModal = false;
      render();
    });
    document.getElementById('saveItemBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('itemName')?.value.trim();
      const price = parseFloat(document.getElementById('itemPrice')?.value);
      const category = document.getElementById('itemCategory')?.value;
      const description = document.getElementById('itemDescription')?.value;
      const file = document.getElementById('itemFile')?.files[0];
      const foodTypeRadio = document.querySelector('input[name="foodType"]:checked');
      const isVeg = foodTypeRadio?.value === 'veg';
      if (!name || !price || isNaN(price) || price <= 0) { showNotification('Please enter valid name and price', 'error'); return; }
      if (editingItem) await updateMenuItem(editingItem.id, { name, price, category, description, veg: isVeg }, file);
      else await addMenuItem({ name, price, category, description, veg: isVeg }, file);
      closeModal();
    });
  }
  
  window.setView = (view) => { currentView = view; render(); };
  window.logout = logoutUser;
  window.saveSettings = saveRestaurantSettings;
  
  loadBillCounter();
  checkAuthState();
</script>
</body>
</html>
