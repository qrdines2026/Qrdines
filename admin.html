  const MAX_IMAGE_SIZE_KB = 400;

  // ======================== HELPER FUNCTIONS ========================
  function showNotification(message, type = 'success') {
    const toast = document.createElement('div');
    const colors = { success: '#22c55e', error: '#ef4444', info: '#3b82f6', warning: '#f59e0b' };
    const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
    toast.className = `toast px-5 py-3 rounded-lg shadow-lg text-white font-medium text-sm flex items-center gap-2`;
    toast.style.background = colors[type] || colors.success;
    toast.innerHTML = `<i class="fas ${icons[type]} mr-2"></i>${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function formatCurrency(amount) {
    return new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(amount);
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // ======================== IMAGE COMPRESSION ========================
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      if (!file) {
        resolve("https://placehold.co/400x200/e2e8f0/475569?text=No+Image");
        return;
      }
      
      if (!file.type.startsWith('image/')) {
        resolve("https://placehold.co/400x200/e2e8f0/475569?text=Not+an+Image");
        return;
      }
      
      isCompressing = true;
      compressProgress = 0;
      render();
      
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          compressProgress = 30;
          render();
          
          let width = img.width;
          let height = img.height;
          
          if (width > MAX_IMAGE_DIMENSION || height > MAX_IMAGE_DIMENSION) {
            if (width > height) {
              height = (height * MAX_IMAGE_DIMENSION) / width;
              width = MAX_IMAGE_DIMENSION;
            } else {
              width = (width * MAX_IMAGE_DIMENSION) / height;
              height = MAX_IMAGE_DIMENSION;
            }
          }
          
          compressProgress = 60;
          render();
          
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          let quality = 0.8;
          let result = canvas.toDataURL('image/jpeg', quality);
          
          while (result.length > MAX_IMAGE_SIZE_KB * 1024 && quality > 0.1) {
            quality -= 0.1;
            result = canvas.toDataURL('image/jpeg', quality);
          }
          
          compressProgress = 100;
          render();
          
          setTimeout(() => {
            isCompressing = false;
            compressProgress = 0;
            resolve(result);
          }, 500);
        };
        img.onerror = () => {
          isCompressing = false;
          resolve("https://placehold.co/400x200/e2e8f0/475569?text=Invalid+Image");
        };
      };
      reader.onerror = () => {
        isCompressing = false;
        reject("Failed to read file");
      };
    });
  }
  
  // ======================== RESTAURANT DATA FUNCTIONS ========================
  async function createRestaurantProfile(userId, name, address, phone) {
    try {
      const restaurantRef = collection(db, "restaurants");
      const restaurantData = {
        userId: userId,
        name: name,
        address: address,
        phone: phone,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      };
      const docRef = await addDoc(restaurantRef, restaurantData);
      return { id: docRef.id, ...restaurantData };
    } catch (error) {
      console.error("Error creating restaurant profile:", error);
      throw error;
    }
  }
  
  async function getRestaurantProfile(userId) {
    try {
      const restaurantsRef = collection(db, "restaurants");
      const q = query(restaurantsRef, where("userId", "==", userId));
      const querySnapshot = await getDocs(q);
      
      if (!querySnapshot.empty) {
        const doc = querySnapshot.docs[0];
        return { id: doc.id, ...doc.data() };
      }
      return null;
    } catch (error) {
      console.error("Error getting restaurant profile:", error);
      return null;
    }
  }
  
  // ======================== DATA ISOLATION - QUERIES WITH userId ========================
  function listenToMenu() {
    if (!isLoggedIn || !currentUser) return;
  
    isLoading = true;
    render();
    
    const menuRef = collection(db, "menu");
    const menuQuery = query(menuRef, where("restaurantId", "==", currentUser.uid));
    
    onSnapshot(menuQuery, (snapshot) => {
      menuItems = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        menuItems.push({ 
          id: doc.id,
          name: data.name || '',
          price: data.price || 0,
          category: data.category || '',
          description: data.description || '',
          image: data.image || "https://placehold.co/400x200/e2e8f0/475569?text=No+Image",
          available: data.available !== false,
          rating: data.rating || 4.5,
          veg: data.veg !== undefined ? data.veg : true,
          popular: data.popular || false,
          createdAt: data.createdAt,
          updatedAt: data.updatedAt
        });
      });
      menuItems.sort((a, b) => {
        if (a.createdAt && b.createdAt) {
          return b.createdAt.seconds - a.createdAt.seconds;
        }
        return 0;
      });
      isLoading = false;
      if (currentView === 'menu') render();
      console.log(`✅ Menu loaded for restaurant ${currentUser.uid}: ${menuItems.length} items`);
    }, (error) => {
      console.error("Error loading menu:", error);
      isLoading = false;
      showNotification("Error loading menu: " + error.message, "error");
    });
  }
  
  function listenToOrders() {
    if (!isLoggedIn || !currentUser) return;
    
    const ordersRef = collection(db, "orders");
    const ordersQuery = query(ordersRef, where("restaurantId", "==", currentUser.uid));
    
    onSnapshot(ordersQuery, (snapshot) => {
      orders = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        orders.push({ 
          id: doc.id,
          tableNumber: data.tableNumber,
          billNumber: data.billNumber || '0001',
          items: data.items || [],
          subtotal: data.subtotal,
          cgst: data.cgst,
          sgst: data.sgst,
          serviceCharge: data.serviceCharge,
          totalPrice: data.totalPrice,
          status: data.status || 'Pending',
          timestamp: data.timestamp,
          restaurantName: data.restaurantName || userRestaurantData?.name || 'QR Dine'
        });
      });
      orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
      if (currentView === 'dashboard' || currentView === 'orders') render();
      console.log(`✅ Orders loaded for restaurant ${currentUser.uid}: ${orders.length} orders`);
    }, (error) => {
      console.error("Error loading orders:", error);
    });
  }

      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      isLoggedIn = true;
      
      userRestaurantData = await getRestaurantProfile(currentUser.uid);
      
      localStorage.setItem('admin_logged', 'true');
      localStorage.setItem('admin_email', email);
      localStorage.setItem('restaurant_id', currentUser.uid);
      
      showNotification(`Welcome back, ${userRestaurantData?.name || email}!`, 'success');
      
      initializeDefaultMenuForRestaurant();
      listenToMenu();
      listenToOrders();
      
      currentView = 'dashboard';
      render();
      return true;
    } catch (error) {
      console.error("Login error:", error);
      let errorMessage = "Login failed";
      if (error.code === 'auth/user-not-found') errorMessage = "User not found. Please register first.";
      else if (error.code === 'auth/wrong-password') errorMessage = "Wrong password.";
      else errorMessage = error.message;
      showNotification(errorMessage, 'error');
      return false;
    }
  }
  
  async function registerUser(email, password, name, restaurantNameInput, address, phone) {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      
      await updateProfile(currentUser, { displayName: name });
      
      userRestaurantData = await createRestaurantProfile(currentUser.uid, restaurantNameInput, address, phone);
      
      isLoggedIn = true;
      localStorage.setItem('admin_logged', 'true');
      localStorage.setItem('admin_email', email);
      localStorage.setItem('restaurant_id', currentUser.uid);
      
      showNotification(`Welcome ${name}! Your restaurant "${restaurantNameInput}" is ready.`, 'success');
      
      await initializeDefaultMenuForRestaurant();
      listenToMenu();
      listenToOrders();
      
      currentView = 'dashboard';
      render();
      return true;
    } catch (error) {
      console.error("Registration error:", error);
      let errorMessage = "Registration failed";
      if (error.code === 'auth/email-already-in-use') errorMessage = "Email already in use.";
      else if (error.code === 'auth/weak-password') errorMessage = "Password should be at least 6 characters.";
      else errorMessage = error.message;
      showNotification(errorMessage, 'error');
      return false;
    }
  }
  
  async function logoutUser() {
    try {
      await signOut(auth);
      currentUser = null;
      userRestaurantData = null;
      isLoggedIn = false;
      menuItems = [];
      orders = [];
      localStorage.removeItem('admin_logged');
      localStorage.removeItem('admin_email');
      localStorage.removeItem('restaurant_id');
      showNotification('Logged out successfully', 'info');
      render();
    } catch (error) {
      console.error("Logout error:", error);
      showNotification("Error logging out", 'error');
    }
  }
  
  function checkAuthState() {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        isLoggedIn = true;
        userRestaurantData = await getRestaurantProfile(currentUser.uid);
        localStorage.setItem('admin_logged', 'true');
        localStorage.setItem('admin_email', user.email);
        localStorage.setItem('restaurant_id', user.uid);
        
        initializeDefaultMenuForRestaurant();
        listenToMenu();
        listenToOrders();
        currentView = 'dashboard';
        render();
      } else {
        currentUser = null;
        userRestaurantData = null;
        isLoggedIn = false;
        render();
      }
    });
  }
  
  // ======================== STATISTICS ========================
  function getStats() {
    const totalOrders = orders.length;
    const pendingOrders = orders.filter(o => o.status === 'Pending').length;
    const acceptedOrders = orders.filter(o => o.status === 'Accepted').length;
    const preparingOrders = orders.filter(o => o.status === 'Preparing').length;
    const readyOrders = orders.filter(o => o.status === 'Ready').length;
    const servedOrders = orders.filter(o => o.status === 'Served').length;
    const declinedOrders = orders.filter(o => o.status === 'Declined').length;
    const totalRevenue = orders.filter(o => o.status !== 'Declined').reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    const availableItems = menuItems.filter(i => i.available).length;
    const unavailableItems = menuItems.filter(i => !i.available).length;
    
    return { totalOrders, pendingOrders, acceptedOrders, preparingOrders, readyOrders, servedOrders, declinedOrders, totalRevenue, availableItems, unavailableItems };
  }
  
  function calculateTax(subtotal) {
    let cgst = (subtotal * TAX_CONFIG.cgst.rate) / 100;
    let sgst = (subtotal * TAX_CONFIG.sgst.rate) / 100;
    let serviceCharge = (subtotal * TAX_CONFIG.serviceCharge.rate) / 100;
    let totalTax = cgst + sgst + serviceCharge;
    let grandTotal = subtotal + totalTax;
    let roundOff = 0;
    
    if (TAX_CONFIG.roundOff) {
      const rounded = Math.round(grandTotal);
      roundOff = rounded - grandTotal;
      grandTotal = rounded;
    }
    
    return { subtotal, cgst, sgst, serviceCharge, totalTax, roundOff, grandTotal };
  }
  
  // ======================== UI FUNCTIONS ========================
  function handleFileSelect(event) {
    const file = event.target.files[0];
    if (file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        imagePreviewUrl = e.target.result;
        const preview = document.getElementById('filePreview');
        if (preview) {
          preview.src = imagePreviewUrl;
          preview.classList.remove('hidden');
        }
        const fileInfo = document.getElementById('fileInfo');
        if (fileInfo) {

                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                  <input type="radio" name="foodType" value="nonveg" ${(item.veg !== undefined ? !item.veg : !selectedVegStatus) ? 'checked' : ''} class="w-4 h-4 text-red-600">
                  <span class="veg-dot red"></span>
                  <span class="font-medium">Non-Vegetarian</span>
                </label>
              </div>
            </div>
            
            <div><label class="block text-sm font-medium mb-1">Upload Image</label><input type="file" id="itemFile" accept="image/*" class="w-full border rounded-lg px-3 py-2"><div class="mt-2"><img id="filePreview" src="${item.image || ''}" class="image-preview ${item.image ? '' : 'hidden'}" onerror="this.src='https://placehold.co/120x120/e2e8f0/475569?text=No+Image'"><div id="fileInfo" class="text-xs text-gray-500 mt-1 ${!item.image ? 'hidden' : ''}"></div></div>${isCompressing ? `<div class="mt-2"><div class="bg-gray-200 rounded-full h-2"><div class="bg-orange-600 h-2 rounded-full compress-progress" style="width: ${compressProgress}%"></div></div><p class="text-xs text-gray-500 mt-1">Compressing: ${compressProgress}%</p></div>` : ''}<p class="text-xs text-gray-400 mt-2"><i class="fas fa-info-circle"></i> Images compressed to under 400KB</p></div>
          </div>
          <div class="flex gap-3 mt-6"><button id="saveItemBtn" class="flex-1 bg-orange-600 text-white py-2 rounded-lg font-semibold" ${isCompressing ? 'disabled' : ''}><i class="fas fa-save mr-2"></i> ${isEditing ? 'Update Item' : 'Add Item'}</button><button id="cancelModalBtn" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button></div>
        </div>
      </div>
    `;
  }
  
  function render() {
    const root = document.getElementById('admin-root');
    if (!root) return;
    
    if (!isLoggedIn) {
      root.innerHTML = renderLogin();
      attachLoginEvents();
      return;
    }
    
    let main = currentView === 'dashboard' ? renderDashboard() : currentView === 'menu' ? renderMenuManagement() : renderOrdersManagement();
    root.innerHTML = main + renderAddEditModal() + renderTaxModal();
    attachEvents();
  }
  
  // ======================== EVENT HANDLERS ========================
  function attachLoginEvents() {
    const loginBtn = document.getElementById('loginBtn');
    const showRegisterBtn = document.getElementById('showRegisterBtn');
    const showLoginBtn = document.getElementById('showLoginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    
    if (loginBtn) {
      loginBtn.addEventListener('click', () => {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;
        if (email && password) {
          loginUser(email, password);
        } else {
          showNotification('Please enter email and password', 'error');
        }
      });
    }
    
    if (showRegisterBtn) {
      showRegisterBtn.addEventListener('click', () => {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
      });
    }
    
    if (showLoginBtn) {
      showLoginBtn.addEventListener('click', () => {
        registerForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
      });
    }
    
    if (registerBtn) {
      registerBtn.addEventListener('click', () => {
        const restaurantName = document.getElementById('restaurantName')?.value;
        const ownerName = document.getElementById('ownerName')?.value;
        const email = document.getElementById('registerEmail')?.value;
        const password = document.getElementById('registerPassword')?.value;
        const address = document.getElementById('restaurantAddress')?.value;
        const phone = document.getElementById('restaurantPhone')?.value;
        
        if (restaurantName && ownerName && email && password) {
          registerUser(email, password, ownerName, restaurantName, address, phone);
        } else {
          showNotification('Please fill all required fields', 'error');
        }
      });
    }
  }
  
  function attachEvents() {
    document.getElementById('logoutBtn')?.addEventListener('click', () => { logoutUser(); });
    document.getElementById('goToMenuBtn')?.addEventListener('click', () => { currentView = 'menu'; render(); });
    document.getElementById('goToOrdersBtn')?.addEventListener('click', () => { currentView = 'orders'; currentTab = 'pending'; render(); });
    document.getElementById('viewAllOrdersBtn')?.addEventListener('click', () => { currentView = 'orders'; currentTab = 'pending'; render(); });
    document.getElementById('backToDashboard')?.addEventListener('click', () => { currentView = 'dashboard'; render(); });
    document.getElementById('backToDashboardOrders')?.addEventListener('click', () => { currentView = 'dashboard'; render(); });
    document.getElementById('addItemBtn')?.addEventListener('click', () => { 
      editingItem = null; 
      selectedFile = null; 
      imagePreviewUrl = null; 
      selectedVegStatus = true;
      showModal = true; 
      render(); 
    });
    document.getElementById('taxSettingsBtn')?.addEventListener('click', () => { showTaxModal = true; render(); });
    
    document.getElementById('itemFile')?.addEventListener('change', handleFileSelect);
    
    document.querySelectorAll('.editItemBtn').forEach(btn => {
      btn.addEventListener('click', () => { 
        editingItem = menuItems.find(i => i.id === btn.dataset.id); 
        selectedFile = null; 
        imagePreviewUrl = editingItem?.image || null; 
        showModal = true; 
        render(); 
      });
    });
    
    document.querySelectorAll('.toggleAvailBtn').forEach(btn => {
      btn.addEventListener('click', () => { toggleAvailability(btn.dataset.id, btn.dataset.available === 'true'); });
    });
    
    document.querySelectorAll('.deleteItemBtn').forEach(btn => {
      btn.addEventListener('click', () => { deleteMenuItem(btn.dataset.id, btn.dataset.name); });
    });
    
    // Order action buttons
    document.querySelectorAll('.acceptOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Accepted'); });
    });
    
    document.querySelectorAll('.declineOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { 
        if (confirm('Are you sure you want to decline this order?')) {
          updateOrderStatus(btn.dataset.id, 'Declined');
        }
      });
    });
    
    document.querySelectorAll('.prepareOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Preparing'); });
    });
    
    document.querySelectorAll('.readyOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Ready'); });
    });
    
    document.querySelectorAll('.serveOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Served'); });
    });
    
    document.querySelectorAll('.deleteOrderBtn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (confirm('Permanently delete this declined order?')) {
          try {
            await deleteDoc(doc(db, "orders", btn.dataset.id));
            showNotification('Order deleted successfully', 'success');
          } catch (error) {
            showNotification('Error deleting order', 'error');
          }
        }
      });
    });
    
    document.querySelectorAll('.order-tab').forEach(tab => {
      tab.addEventListener('click', () => { currentTab = tab.dataset.tab; render(); });
    });
    
    const closeModal = () => { showModal = false; editingItem = null; selectedFile = null; imagePreviewUrl = null; isCompressing = false; compressProgress = 0; render(); };
    const closeTaxModal = () => { showTaxModal = false; render(); };
    
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('cancelModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('modalOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });
    document.getElementById('closeTaxModal')?.addEventListener('click', closeTaxModal);
    document.getElementById('cancelTaxBtn')?.addEventListener('click', closeTaxModal);
    document.getElementById('taxModalOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'taxModalOverlay') closeTaxModal(); });
    
    document.getElementById('saveTaxBtn')?.addEventListener('click', () => {
      TAX_CONFIG.cgst.enabled = document.getElementById('cgstEnabled')?.checked || false;
      TAX_CONFIG.sgst.enabled = document.getElementById('sgstEnabled')?.checked || false;
      TAX_CONFIG.serviceCharge.enabled = document.getElementById('serviceChargeEnabled')?.checked || false;
      TAX_CONFIG.roundOff = document.getElementById('roundOffEnabled')?.checked || false;
      showNotification('Tax settings saved!', 'success');
      showTaxModal = false;
      render();
    });
    
    document.getElementById('saveItemBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('itemName')?.value.trim();
      const price = parseFloat(document.getElementById('itemPrice')?.value);
      const category = document.getElementById('itemCategory')?.value;
      const description = document.getElementById('itemDescription')?.value;
      const file = document.getElementById('itemFile')?.files[0];
      
      const foodTypeRadio = document.querySelector('input[name="foodType"]:checked');
      const isVeg = foodTypeRadio?.value === 'veg';
      
      if (!name || !price || isNaN(price) || price <= 0) {
        showNotification('Please enter valid name and price', 'error');
        return;
      }
      
      if (editingItem) {
        await updateMenuItem(editingItem.id, { name, price, category, description, veg: isVeg }, file);
      } else {
        await addMenuItem({ name, price, category, description, veg: isVeg }, file);
      }
      closeModal();
    });
  }
  
  // ======================== INITIALIZATION ========================
  function init() {
    loadBillCounter();
    checkAuthState();
  }
  
  init();
</script>
</body>
</html>
