<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>QR Dine | Owner Dashboard - Complete Restaurant Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f1f5f9; overflow-x: hidden; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast-notification { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; z-index: 1000; animation: slideIn 0.3s ease-out; }
    .stat-card { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); transition: all 0.3s ease; }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-completed { background: #dcfce7; color: #166534; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-preparing { background: #dbeafe; color: #1e40af; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
    .sidebar-nav { transition: all 0.2s ease; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; margin-bottom: 4px; }
    .sidebar-nav:hover { background: #fef3c7; color: #f97316; }
    .sidebar-nav.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
    .veg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .veg-dot.green { background: #22c55e; }
    .veg-dot.red { background: #ef4444; }
    .upload-area { border: 2px dashed #cbd5e1; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
    .upload-area:hover { border-color: #f97316; background: #fef3c7; }
    .image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid #f97316; margin-top: 10px; }
    
    .sidebar-container {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 260px;
      background: white;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
      z-index: 20;
      display: flex;
      flex-direction: column;
    }
    .sidebar-nav-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: white;
    }
    .main-content {
      margin-left: 260px;
      min-height: 100vh;
    }
    .dark-mode .sidebar-container { background: #1e293b; }
    .dark-mode .sidebar-footer { border-color: #334155; background: #1e293b; }
    .dark-mode .bg-white { background: #1e293b; }
    .dark-mode .bg-gray-50 { background: #0f172a; }
    .dark-mode .text-gray-600 { color: #94a3b8; }
    .dark-mode .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
  </style>
</head>
<body>
<div id="owner-portal"></div>

<script type="module">
  // ======================== FIREBASE CONFIGURATION ========================
  const firebaseConfig = {
    apiKey: "AIzaSyDnTl39uYi-NHhBEMeObezN2Uyqkk8sk6Q",
    authDomain: "qrdines-829b7.firebaseapp.com",
    projectId: "qrdines-829b7",
    storageBucket: "qrdines-829b7.firebasestorage.app",
    messagingSenderId: "1025530812948",
    appId: "1:1025530812948:web:66f8e69e0d5af83461e501",
    measurementId: "G-8Y4DWD208G"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    updateDoc, 
    deleteDoc, 
    doc, 
    onSnapshot, 
    query, 
    where, 
    orderBy,
    serverTimestamp,
    getDocs,
    setDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ======================== GLOBAL STATE ========================
  let currentUser = null;
  let isLoggedIn = false;
  let currentView = 'dashboard';
  let darkMode = localStorage.getItem('ownerDarkMode') === 'true';
  let showStaffModal = false;
  let showInventoryModal = false;
  let showMenuItemModal = false;
  let editingStaff = null;
  let editingInventory = null;
  let editingMenuItem = null;
  let selectedImageFile = null;
  let imagePreviewUrl = null;
  let activityLogs = [];
  
  // Firebase Data
  let menuItems = [];
  let orders = [];
  let staffMembers = [];
  let expenses = [];
  let inventory = [];
  let restaurantData = null;
  
  // Restaurant Settings
  let restaurantSettings = {
    name: 'My Restaurant',
    address: '',
    phone: '',
    email: '',
    gstin: '',
    kitchenNote: ''
  };
  
  let taxConfig = {
    cgst: { rate: 2.5, enabled: true },
    sgst: { rate: 2.5, enabled: true },
    serviceCharge: { rate: 5, enabled: true },
    roundOff: true
  };
  
  let revenueData = { monthly: [] };
  let expenseBreakdown = { Ingredients: 35, 'Staff Salary': 30, Rent: 15, Utilities: 10, Marketing: 6, Maintenance: 4 };
  
  // Chart instances
  let revenueChartInstance = null;
  let expenseChartInstance = null;
  let categoryChartInstance = null;
  
  // Unsubscribe functions
  let unsubscribeMenu = null;
  let unsubscribeOrders = null;
  let unsubscribeStaff = null;
  let unsubscribeInventory = null;
  let unsubscribeExpenses = null;
  let unsubscribeLogs = null;
  
  const categories = ['Starters', 'Main Course', 'Breads', 'Beverages', 'Desserts'];
  
  // ======================== HELPER FUNCTIONS ========================
  function showNotification(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i>${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function formatCurrency(amount) { return '₹' + amount.toLocaleString(); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  
  function compressImage(file) {
    return new Promise((resolve) => {
      if (!file) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = (e) => { resolve(e.target.result); };
      reader.readAsDataURL(file);
    });
  }
  
  async function addLog(action, details) {
    if (!currentUser) return;
    try {
      await addDoc(collection(db, "activityLogs"), {
        restaurantId: currentUser.uid,
        action,
        details,
        timestamp: serverTimestamp(),
        user: currentUser.email
      });
    } catch (error) { console.error("Error logging:", error); }
    activityLogs.unshift({ id: Date.now(), timestamp: new Date().toLocaleString(), action, details, user: currentUser.email });
    if (activityLogs.length > 100) activityLogs.pop();
  }
  
  // ======================== FIREBASE LISTENERS ========================
  function listenToMenu() {
    if (!currentUser) return;
    const menuQuery = query(collection(db, "menu"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeMenu) unsubscribeMenu();
    unsubscribeMenu = onSnapshot(menuQuery, (snapshot) => {
      menuItems = [];
      snapshot.forEach((doc) => { menuItems.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'menu') render();
    });
  }
  
  function listenToOrders() {
    if (!currentUser) return;
    const ordersQuery = query(collection(db, "orders"), where("restaurantId", "==", currentUser.uid), orderBy("timestamp", "desc"));
    if (unsubscribeOrders) unsubscribeOrders();
    unsubscribeOrders = onSnapshot(ordersQuery, (snapshot) => {
      orders = [];
      snapshot.forEach((doc) => { orders.push({ id: doc.id, ...doc.data() }); });
      console.log(`✅ Orders loaded: ${orders.length} orders for restaurant ${currentUser.uid}`);
      if (currentView === 'dashboard' || currentView === 'orders' || currentView === 'orderhistory') render();
    });
  }
  
  function listenToStaff() {
    if (!currentUser) return;
    const staffQuery = query(collection(db, "staff"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeStaff) unsubscribeStaff();
    unsubscribeStaff = onSnapshot(staffQuery, (snapshot) => {
      staffMembers = [];
      snapshot.forEach((doc) => { staffMembers.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'staff') render();
    });
  }
  
  function listenToInventory() {
    if (!currentUser) return;
    const invQuery = query(collection(db, "inventory"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeInventory) unsubscribeInventory();
    unsubscribeInventory = onSnapshot(invQuery, (snapshot) => {
      inventory = [];
      snapshot.forEach((doc) => { inventory.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'inventory') render();
    });
  }
  
  function listenToExpenses() {
    if (!currentUser) return;
    const expQuery = query(collection(db, "expenses"), where("restaurantId", "==", currentUser.uid), orderBy("date", "desc"));
    if (unsubscribeExpenses) unsubscribeExpenses();
    unsubscribeExpenses = onSnapshot(expQuery, (snapshot) => {
      expenses = [];
      snapshot.forEach((doc) => { expenses.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'expenses') render();
    });
  }
  
  function listenToLogs() {
    if (!currentUser) return;
    const logQuery = query(collection(db, "activityLogs"), where("restaurantId", "==", currentUser.uid), orderBy("timestamp", "desc"));
    if (unsubscribeLogs) unsubscribeLogs();
    unsubscribeLogs = onSnapshot(logQuery, (snapshot) => {
      activityLogs = [];
      snapshot.forEach((doc) => { 
        const data = doc.data();
        activityLogs.push({ id: doc.id, ...data, timestamp: data.timestamp?.toDate?.()?.toLocaleString() || new Date().toLocaleString() });
      });
      if (currentView === 'logs') render();
    });
  }
  
  // ======================== MENU CRUD ========================
  async function addMenuItem(itemData, file) {
    try {
      let imageUrl = 'https://placehold.co/80x80/F97316/white?text=Food';
      if (file) imageUrl = await compressImage(file);
      await addDoc(collection(db, "menu"), {
        restaurantId: currentUser.uid,
        name: itemData.name,
        price: parseFloat(itemData.price),
        category: itemData.category,
        description: itemData.description || '',
        image: imageUrl,
        veg: itemData.veg,
        available: true,
        createdAt: serverTimestamp()
      });
      addLog('ADD_MENU_ITEM', `Added ${itemData.name}`);
      showNotification(`✅ "${itemData.name}" added!`);
      return true;
    } catch (error) { showNotification("Error: " + error.message, 'error'); return false; }
  }
  
  async function updateMenuItem(id, updates, file) {
    try {
      let updateData = {
        name: updates.name,
        price: parseFloat(updates.price),
        category: updates.category,
        description: updates.description || '',
        veg: updates.veg,
        updatedAt: serverTimestamp()
      };
      if (file) updateData.image = await compressImage(file);
      await updateDoc(doc(db, "menu", id), updateData);
      addLog('UPDATE_MENU_ITEM', `Updated ${updates.name}`);
      showNotification(`✅ "${updates.name}" updated!`);
      return true;
    } catch (error) { showNotification("Error: " + error.message, 'error'); return false; }
  }
  
  async function deleteMenuItem(id, name) {
    if (!confirm(`⚠️ Delete "${name}" permanently?`)) return;
    try {
      await deleteDoc(doc(db, "menu", id));
      addLog('DELETE_MENU_ITEM', `Deleted ${name}`);
      showNotification(`✅ "${name}" deleted!`);
    } catch (error) { showNotification("Error deleting", 'error'); }
  }
  
  async function toggleMenuItemAvailability(id, currentStatus, name) {
    try {
      await updateDoc(doc(db, "menu", id), { available: !currentStatus });
      addLog('TOGGLE_MENU', `${name} ${!currentStatus ? 'available' : 'unavailable'}`);
      showNotification(`${name} ${!currentStatus ? 'available' : 'unavailable'}`);
    } catch (error) { showNotification("Error updating status", 'error'); }
  }
  
  // ======================== STAFF CRUD ========================
  async function openStaffModal(staff = null) { editingStaff = staff; showStaffModal = true; render(); }
  async function saveStaff() {
    const name = document.getElementById('staffName')?.value;
    const role = document.getElementById('staffRole')?.value;
    const salary = parseFloat(document.getElementById('staffSalary')?.value);
    const phone = document.getElementById('staffPhone')?.value;
    if (!name || !role || !salary) { showNotification('Please fill all fields', 'error'); return; }
    try {
      if (editingStaff) {
        await updateDoc(doc(db, "staff", editingStaff.id), { name, role, salary, phone });
        addLog('EDIT_STAFF', `Updated ${name}`);
        showNotification('Staff updated');
      } else {
        await addDoc(collection(db, "staff"), {
          restaurantId: currentUser.uid,
          name, role, salary, phone,
          joinDate: new Date().toISOString(),
          createdAt: serverTimestamp()
        });
        addLog('ADD_STAFF', `Added ${name}`);
        showNotification(`Staff ${name} added`);
      }
    } catch (error) { showNotification("Error saving staff", 'error'); }
    showStaffModal = false; editingStaff = null; render();
  }
  async function deleteStaff(id, name) {
    if (!confirm(`Remove ${name}?`)) return;
    try {
      await deleteDoc(doc(db, "staff", id));
      addLog('DELETE_STAFF', `Removed ${name}`);
      showNotification('Staff removed');
      render();
    } catch (error) { showNotification("Error deleting staff", 'error'); }
  }
  
  // ======================== INVENTORY CRUD ========================
  async function openInventoryModal(item = null) { editingInventory = item; showInventoryModal = true; render(); }
  async function saveInventory() {
    const name = document.getElementById('invName')?.value;
    const quantity = parseFloat(document.getElementById('invQuantity')?.value);
    const unit = document.getElementById('invUnit')?.value;
    const threshold = parseFloat(document.getElementById('invThreshold')?.value);
    const price = parseFloat(document.getElementById('invPrice')?.value);
    if (!name || isNaN(quantity) || !unit) { showNotification('Please fill all fields', 'error'); return; }
    try {
      if (editingInventory) {
        await updateDoc(doc(db, "inventory", editingInventory.id), { name, quantity, unit, threshold, price });
        addLog('EDIT_INVENTORY', `Updated ${name}`);
        showNotification('Inventory updated');
      } else {
        await addDoc(collection(db, "inventory"), {
          restaurantId: currentUser.uid,
          name, quantity, unit, threshold, price,
          createdAt: serverTimestamp()
        });
        addLog('ADD_INVENTORY', `Added ${name}`);
        showNotification(`Item ${name} added`);
      }
    } catch (error) { showNotification("Error saving inventory", 'error'); }
    showInventoryModal = false; editingInventory = null; render();
  }
  async function deleteInventory(id, name) {
    if (!confirm(`Delete ${name}?`)) return;
    try {
      await deleteDoc(doc(db, "inventory", id));
      addLog('DELETE_INVENTORY', `Removed ${name}`);
      showNotification('Item removed');
      render();
    } catch (error) { showNotification("Error deleting item", 'error'); }
  }
  async function updateInventoryQuantity(id, currentQty, name) {
    const newQty = prompt(`Update quantity for ${name}:`, currentQty);
    if (newQty && !isNaN(parseFloat(newQty))) {
      try {
        await updateDoc(doc(db, "inventory", id), { quantity: parseFloat(newQty) });
        addLog('UPDATE_INVENTORY', `${name} quantity: ${newQty}`);
        showNotification('Inventory updated');
        render();
      } catch (error) { showNotification("Error updating quantity", 'error'); }
    }
  }
  
  // ======================== EXPENSE CRUD ========================
  async function addExpense() {
    const category = prompt('Category:'); if(!category) return;
    const amount = parseFloat(prompt('Amount:')); if(!amount) return;
    const description = prompt('Description:'); if(!description) return;
    try {
      await addDoc(collection(db, "expenses"), {
        restaurantId: currentUser.uid,
        category, amount, description,
        date: new Date().toISOString(),
        createdAt: serverTimestamp()
      });
      addLog('ADD_EXPENSE', `${category}: ${formatCurrency(amount)}`);
      showNotification('Expense added');
      render();
    } catch (error) { showNotification("Error adding expense", 'error'); }
  }
  async function deleteExpense(id) {
    if (!confirm('Delete expense?')) return;
    try {
      await deleteDoc(doc(db, "expenses", id));
      addLog('DELETE_EXPENSE', 'Deleted expense');
      showNotification('Expense deleted');
      render();
    } catch (error) { showNotification("Error deleting expense", 'error'); }
  }
  
  // ======================== ORDER ACTIONS ========================
  async function updateOrderStatus(orderId, newStatus) {
    try {
      await updateDoc(doc(db, "orders", orderId), { status: newStatus });
      showNotification(`Order status updated to ${newStatus}`, 'success');
      render();
    } catch (error) { showNotification("Error updating order", 'error'); }
  }
  
  function printBill(order) {
    const printWindow = window.open('', '_blank');
    const orderDate = new Date(order.timestamp).toLocaleString();
    printWindow.document.write(`
      <!DOCTYPE html>
      <html><head><title>Bill #${order.billNumber}</title>
      <style>body{font-family:monospace;padding:20px;max-width:400px;margin:0 auto;}</style>
      </head><body>
      <div style="text-align:center;"><h2>${restaurantSettings.name || 'QR Dine'}</h2><hr></div>
      <div><p><strong>Bill No:</strong> ${order.billNumber || '0001'}</p><p><strong>Table:</strong> ${order.tableNumber}</p><p><strong>Date:</strong> ${orderDate}</p></div>
      <table style="width:100%;">${order.items?.map(item => `<td><td style="padding:4px;">${item.name} x${item.quantity}</td><td style="text-align:right;">${formatCurrency(item.price * item.quantity)}</td></tr>`).join('')}</table>
      <hr><div style="text-align:right;"><strong>Total: ${formatCurrency(order.totalPrice)}</strong></div>
      <div style="text-align:center; margin-top:20px;"><p>Thank you! Visit Again</p></div>
      <script>window.print();setTimeout(window.close,1000);<\/script>
      </body></html>
    `);
    printWindow.document.close();
  }
  
  // ======================== SETTINGS ========================
  async function saveSettings() {
    try {
      await setDoc(doc(db, "restaurants", currentUser.uid), {
        userId: currentUser.uid,
        name: document.getElementById('restoName')?.value,
        address: document.getElementById('restoAddress')?.value,
        phone: document.getElementById('restoPhone')?.value,
        email: document.getElementById('restoEmail')?.value,
        gstin: document.getElementById('restoGST')?.value,
        kitchenNote: document.getElementById('kitchenNote')?.value,
        updatedAt: serverTimestamp()
      }, { merge: true });
      restaurantSettings.name = document.getElementById('restoName')?.value;
      restaurantSettings.address = document.getElementById('restoAddress')?.value;
      restaurantSettings.phone = document.getElementById('restoPhone')?.value;
      restaurantSettings.email = document.getElementById('restoEmail')?.value;
      restaurantSettings.gstin = document.getElementById('restoGST')?.value;
      restaurantSettings.kitchenNote = document.getElementById('kitchenNote')?.value;
      taxConfig.cgst.enabled = document.getElementById('cgstEnabled')?.checked;
      taxConfig.sgst.enabled = document.getElementById('sgstEnabled')?.checked;
      taxConfig.serviceCharge.enabled = document.getElementById('serviceChargeEnabled')?.checked;
      taxConfig.roundOff = document.getElementById('roundOffEnabled')?.checked;
      addLog('SETTINGS_UPDATED', 'Settings saved');
      showNotification('Settings saved successfully');
    } catch (error) { showNotification("Error saving settings", 'error'); }
  }
  
  // ======================== AUTHENTICATION ========================
  async function login(email, password) {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      isLoggedIn = true;
      localStorage.setItem('owner_logged', 'true');
      
      const restoDoc = await getDoc(doc(db, "restaurants", currentUser.uid));
      if (restoDoc.exists()) {
        const data = restoDoc.data();
        restaurantSettings.name = data.name || 'My Restaurant';
        restaurantSettings.address = data.address || '';
        restaurantSettings.phone = data.phone || '';
      }
      
      addLog('OWNER_LOGIN', 'Logged in');
      listenToMenu();
      listenToOrders();
      listenToStaff();
      listenToInventory();
      listenToExpenses();
      listenToLogs();
      
      for (let i = 1; i <= 12; i++) {
        revenueData.monthly.push({ month: i, amount: Math.floor(Math.random() * 150000) + 50000 });
      }
      
      render();
    } catch (error) { showNotification('Login failed: ' + error.message, 'error'); }
  }
  
  async function register(email, password, name, restoName, address, phone) {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      await updateProfile(currentUser, { displayName: name });
      
      await setDoc(doc(db, "restaurants", currentUser.uid), {
        userId: currentUser.uid,
        name: restoName,
        owner: name,
        email: email,
        address: address,
        phone: phone,
        createdAt: serverTimestamp()
      });
      
      isLoggedIn = true;
      localStorage.setItem('owner_logged', 'true');
      restaurantSettings.name = restoName;
      
      addLog('OWNER_REGISTER', `Registered: ${restoName}`);
      showNotification(`Welcome ${name}!`, 'success');
      
      listenToMenu();
      listenToOrders();
      listenToStaff();
      listenToInventory();
      listenToExpenses();
      listenToLogs();
      
      for (let i = 1; i <= 12; i++) {
        revenueData.monthly.push({ month: i, amount: Math.floor(Math.random() * 150000) + 50000 });
      }
      
      render();
    } catch (error) { showNotification(error.message, 'error'); }
  }
  
  function logout() { 
    addLog('OWNER_LOGOUT', 'Logged out'); 
    currentUser = null; 
    isLoggedIn = false; 
    localStorage.removeItem('owner_logged'); 
    render(); 
  }
  
  function toggleDarkMode() { 
    darkMode = !darkMode; 
    localStorage.setItem('ownerDarkMode', darkMode); 
    render(); 
  }
  
  function checkAuthState() {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        isLoggedIn = true;
        listenToMenu();
        listenToOrders();
        listenToStaff();
        listenToInventory();
        listenToExpenses();
        listenToLogs();
        for (let i = 1; i <= 12; i++) {
          revenueData.monthly.push({ month: i, amount: Math.floor(Math.random() * 150000) + 50000 });
        }
        render();
      } else { isLoggedIn = false; render(); }
    });
  }
  
  // ======================== STATISTICS ========================
  function getStats() {
    const totalOrders = orders.length;
    const pendingOrders = orders.filter(o => o.status === 'Pending').length;
    const totalRevenue = orders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    const availableItems = menuItems.filter(i => i.available).length;
    const lowStockItems = inventory.filter(i => i.quantity <= i.threshold);
    const bestSeller = menuItems.sort((a,b) => (b.orders || 0) - (a.orders || 0))[0];
    return { totalOrders, pendingOrders, totalRevenue, availableItems, lowStockItems, bestSeller };
  }
  
  function getFinancialStats() {
    const totalRevenue = orders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
    const profitMargin = totalRevenue ? ((totalRevenue - totalExpenses) / totalRevenue * 100).toFixed(1) : 0;
    return { totalRevenue, totalExpenses, profitMargin };
  }

  function render() {
    const root = document.getElementById('owner-portal');
    if (!root) return;
    if (!isLoggedIn) { root.innerHTML = renderLogin(); attachLoginEvents(); return; }
    if (darkMode) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode');
    root.innerHTML = `<div class="min-h-screen bg-gray-50">${renderSidebar()}<div class="main-content">${renderTopBar()}${renderMainContent()}</div>${renderModals()}</div>`;
    
    document.querySelectorAll('.sidebar-nav').forEach(el => { el.addEventListener('click', () => { currentView = el.dataset.view; render(); }); });
    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    
    document.querySelectorAll('.acceptOrderBtn').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Accepted')));
    document.querySelectorAll('.declineOrderBtn').forEach(btn => btn.addEventListener('click', () => { if(confirm('Decline this order?')) updateOrderStatus(btn.dataset.id, 'Declined'); }));
    document.querySelectorAll('.prepareOrderBtn').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Preparing')));
    document.querySelectorAll('.readyOrderBtn').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Ready')));
    document.querySelectorAll('.serveOrderBtn').forEach(btn => btn.addEventListener('click', () => updateOrderStatus(btn.dataset.id, 'Served')));
    document.querySelectorAll('.printOrderBtn').forEach(btn => btn.addEventListener('click', () => { const order = JSON.parse(btn.dataset.order); printBill(order); }));
  }
  
  function attachLoginEvents() {
    document.getElementById('loginBtn')?.addEventListener('click', () => { const email = document.getElementById('loginEmail')?.value; const pwd = document.getElementById('loginPassword')?.value; if(email && pwd) login(email, pwd); });
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); });
    document.getElementById('registerBtn')?.addEventListener('click', () => { const name = document.getElementById('regName')?.value; const resto = document.getElementById('regRestoName')?.value; const email = document.getElementById('regEmail')?.value; const pwd = document.getElementById('regPassword')?.value; const addr = document.getElementById('regAddress')?.value; const phone = document.getElementById('regPhone')?.value; if(name && resto && email && pwd) register(email, pwd, name, resto, addr, phone); });
  }
  
  // Expose global functions
  window.toggleMenuItem = toggleMenuItemAvailability;
  window.deleteMenuItem = deleteMenuItem;
  window.editMenuItem = (id) => { editingMenuItem = menuItems.find(i => i.id === id); selectedImageFile = null; imagePreviewUrl = editingMenuItem?.image; showMenuItemModal = true; render(); };
  window.openMenuItemModal = () => { editingMenuItem = null; selectedImageFile = null; imagePreviewUrl = null; showMenuItemModal = true; render(); };
  window.saveMenuItem = async () => {
    const name = document.getElementById('itemName')?.value;
    const price = parseFloat(document.getElementById('itemPrice')?.value);
    const category = document.getElementById('itemCategory')?.value;
    const description = document.getElementById('itemDescription')?.value;
    const veg = document.querySelector('input[name="vegType"]:checked')?.value === 'veg';
    const file = document.getElementById('imageUpload')?.files[0];
    if (!name || !price) { showNotification('Please fill name and price', 'error'); return; }
    if (editingMenuItem) await updateMenuItem(editingMenuItem.id, { name, price, category, description, veg }, file);
    else await addMenuItem({ name, price, category, description, veg }, file);
    showMenuItemModal = false; editingMenuItem = null; selectedImageFile = null; imagePreviewUrl = null; render();
  };
  window.openStaffModal = openStaffModal;
  window.saveStaff = saveStaff;
  window.deleteStaff = deleteStaff;
  window.openInventoryModal = openInventoryModal;
  window.saveInventory = saveInventory;
  window.deleteInventory = deleteInventory;
  window.updateInventoryQuantity = updateInventoryQuantity;
  window.addExpense = addExpense;
  window.deleteExpense = deleteExpense;
  window.saveSettings = saveSettings;
  window.closeModals = () => { showStaffModal = false; showInventoryModal = false; showMenuItemModal = false; editingStaff = null; editingInventory = null; editingMenuItem = null; selectedImageFile = null; imagePreviewUrl = null; render(); };
  
  document.addEventListener('change', (e) => {
    if (e.target.id === 'imageUpload') {
      const file = e.target.files[0];
      if (file) {
        selectedImageFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => { imagePreviewUrl = ev.target.result; render(); };
        reader.readAsDataURL(file);
      }
    }
  });
  
  checkAuthState();
</script>
</body>
</html>
