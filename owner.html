<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>QR Dine | Owner Dashboard - Complete Restaurant Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f1f5f9; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .toast-notification { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: white; padding: 12px 20px; border-radius: 12px; z-index: 1000; animation: slideIn 0.3s ease-out; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .stat-card { background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%); transition: all 0.3s ease; }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .dark-mode { background: #0f172a; color: #f1f5f9; }
    .dark-mode .bg-white { background: #1e293b; }
    .dark-mode .bg-gray-50 { background: #0f172a; }
    .dark-mode .text-gray-600 { color: #94a3b8; }
    .dark-mode .border-gray-200 { border-color: #334155; }
    .dark-mode .stat-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    .badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .badge-completed { background: #dcfce7; color: #166534; }
    .badge-pending { background: #fef3c7; color: #92400e; }
    .badge-preparing { background: #dbeafe; color: #1e40af; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; border-radius: 20px; max-width: 500px; width: 90%; max-height: 85vh; overflow-y: auto; padding: 24px; }
    .dark-mode .modal-content { background: #1e293b; }
    .sidebar-nav { transition: all 0.2s ease; cursor: pointer; }
    .sidebar-nav:hover { background: #fef3c7; color: #f97316; }
    .sidebar-nav.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.3); }
    .veg-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
    .veg-dot.green { background: #22c55e; }
    .veg-dot.red { background: #ef4444; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    .sidebar-container {
      position: fixed;
      left: 0;
      top: 0;
      height: 100vh;
      width: 260px;
      background: white;
      box-shadow: 2px 0 10px rgba(0,0,0,0.05);
      z-index: 20;
      display: flex;
      flex-direction: column;
    }
    .dark-mode .sidebar-container { background: #1e293b; }
    .sidebar-nav-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid #e5e7eb;
    }
    .dark-mode .sidebar-footer { border-color: #334155; }
    .main-content {
      margin-left: 260px;
      min-height: 100vh;
    }
    @media (max-width: 768px) {
      .sidebar-container { transform: translateX(-100%); transition: transform 0.3s; }
      .sidebar-container.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
    }
    .chart-container { height: 300px; position: relative; }
    canvas { max-height: 280px; width: 100% !important; }
  </style>
</head>

<script type="module">
  // ======================== FIREBASE CONFIGURATION ========================
  const firebaseConfig = {

    authDomain: "qrdines-829b7.firebaseapp.com",
    projectId: "qrdines-829b7",

    messagingSenderId: "1025530812948",
    appId: "1:1025530812948:web:66f8e69e0d5af83461e501",
    measurementId: "G-8Y4DWD208G"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    updateDoc, 
    deleteDoc,

    onSnapshot, 
    query, 
    where, 
    orderBy,

    setDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ======================== GLOBAL STATE ========================
  let currentUser = null;
  let isLoggedIn = false;
  let currentView = 'dashboard';
  let darkMode = localStorage.getItem('ownerDarkMode') === 'true';
  
  // Data from Firebase (owner-specific)
  let menuItems = [];
  let orders = [];
  let staffMembers = [];
  let expenses = [];
  let inventory = [];
  let reviews = [];
  let activityLogs = [];
  
  let restaurantSettings = {
    name: 'Spice Garden',
    address: '123 Food Street, MG Road, Bangalore',
    phone: '+91 98765 43210',
    email: 'contact@spicegarden.com',
    gstin: '32ABCDE1234F1Z5'
  };
  
  let taxConfig = {
    cgst: { rate: 2.5, enabled: true, name: 'CGST' },
    sgst: { rate: 2.5, enabled: true, name: 'SGST' },
    serviceCharge: { rate: 5, enabled: true, name: 'Service Charge' },
    roundOff: true
  };
  
  // UI State
  let showStaffModal = false;
  let showInventoryModal = false;
  let showMenuItemModal = false;
  let editingStaff = null;
  let editingInventory = null;
  let editingMenuItem = null;
  let selectedImageFile = null;
  let imagePreviewUrl = null;
  
  // Chart instances
  let revenueChart = null;
  let categoryChart = null;
  
  // Unsubscribe functions
  let unsubscribeMenu = null;
  let unsubscribeOrders = null;
  let unsubscribeStaff = null;
  let unsubscribeExpenses = null;
  let unsubscribeInventory = null;
  let unsubscribeReviews = null;
  let unsubscribeLogs = null;
  
  // ======================== HELPER FUNCTIONS ========================
  function showNotification(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i>${msg}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function formatCurrency(amount) { return '₹' + amount.toLocaleString(); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  
  async function addLog(action, details) {
    if (!currentUser) return;
    try {
      await addDoc(collection(db, "activityLogs"), {
        restaurantId: currentUser.uid,
        action,
        details,
        timestamp: serverTimestamp(),
        user: currentUser.email
      });
    } catch (error) { console.error("Error logging:", error); }
    activityLogs.unshift({ id: Date.now(), timestamp: new Date().toLocaleString(), action, details, user: currentUser.email });
    if (activityLogs.length > 100) activityLogs.pop();
  }
  
  // ======================== FIREBASE LISTENERS ========================
  function listenToMenu() {
    if (!currentUser) return;
    const menuQuery = query(collection(db, "menu"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeMenu) unsubscribeMenu();
    unsubscribeMenu = onSnapshot(menuQuery, (snapshot) => {
      menuItems = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        menuItems.push({ id: doc.id, ...data });
      });
      if (currentView === 'menu') render();
    });
  }
  
  function listenToOrders() {
    if (!currentUser) return;
    const ordersQuery = query(collection(db, "orders"), where("restaurantId", "==", currentUser.uid), orderBy("timestamp", "desc"));
    if (unsubscribeOrders) unsubscribeOrders();
    unsubscribeOrders = onSnapshot(ordersQuery, (snapshot) => {
      orders = [];
      snapshot.forEach((doc) => {
        orders.push({ id: doc.id, ...doc.data() });
      });
      console.log(`✅ Owner: Loaded ${orders.length} orders for restaurant ${restaurantSettings.name}`);
      if (currentView === 'orderhistory' || currentView === 'dashboard' || currentView === 'analytics') render();
    });
  }
  
  function listenToStaff() {
    if (!currentUser) return;
    const staffQuery = query(collection(db, "staff"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeStaff) unsubscribeStaff();
    unsubscribeStaff = onSnapshot(staffQuery, (snapshot) => {
      staffMembers = [];
      snapshot.forEach((doc) => { staffMembers.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'staff') render();
    });
  }
  
  function listenToInventory() {
    if (!currentUser) return;
    const invQuery = query(collection(db, "inventory"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeInventory) unsubscribeInventory();
    unsubscribeInventory = onSnapshot(invQuery, (snapshot) => {
      inventory = [];
      snapshot.forEach((doc) => { inventory.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'inventory') render();
    });
  }
  
  function listenToExpenses() {
    if (!currentUser) return;
    const expQuery = query(collection(db, "expenses"), where("restaurantId", "==", currentUser.uid), orderBy("date", "desc"));
    if (unsubscribeExpenses) unsubscribeExpenses();
    unsubscribeExpenses = onSnapshot(expQuery, (snapshot) => {
      expenses = [];
      snapshot.forEach((doc) => { expenses.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'expenses') render();
    });
  }
  
  function listenToReviews() {
    if (!currentUser) return;
    const reviewQuery = query(collection(db, "reviews"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeReviews) unsubscribeReviews();
    unsubscribeReviews = onSnapshot(reviewQuery, (snapshot) => {
      reviews = [];
      snapshot.forEach((doc) => { reviews.push({ id: doc.id, ...doc.data() }); });
      if (currentView === 'reviews') render();
    });
  }
  
  function listenToLogs() {
    if (!currentUser) return;
    const logQuery = query(collection(db, "activityLogs"), where("restaurantId", "==", currentUser.uid), orderBy("timestamp", "desc"));
    if (unsubscribeLogs) unsubscribeLogs();
    unsubscribeLogs = onSnapshot(logQuery, (snapshot) => {
      activityLogs = [];
      snapshot.forEach((doc) => { 
        const data = doc.data();
        activityLogs.push({ 
          id: doc.id, 
          ...data, 
          timestamp: data.timestamp?.toDate?.()?.toLocaleString() || new Date().toLocaleString() 
        });
      });
      if (currentView === 'logs') render();
    });
  }
  
  // ======================== MENU CRUD ========================
  function compressImage(file) {
    return new Promise((resolve) => {
      if (!file) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = (e) => { resolve(e.target.result); };
      reader.readAsDataURL(file);
    });
  }
  
  async function addMenuItem(itemData, file) {
    try {
      let imageUrl = 'https://placehold.co/80x80/F97316/white?text=Food';
      if (file) imageUrl = await compressImage(file);
      await addDoc(collection(db, "menu"), {
        restaurantId: currentUser.uid,
        name: itemData.name,
        price: parseFloat(itemData.price),
        category: itemData.category,
        description: itemData.description || '',
        image: imageUrl,
        veg: itemData.veg,
        available: true,
        cost: itemData.cost || itemData.price * 0.6,
        createdAt: serverTimestamp()
      });
      await addLog('ADD_MENU_ITEM', `Added ${itemData.name}`);
      showNotification(`✅ "${itemData.name}" added to menu!`);
      render();
      return true;
    } catch (error) { showNotification("Error: " + error.message, 'error'); return false; }
  }
  
  async function updateMenuItem(id, updates, file) {
    try {
      let updateData = {
        name: updates.name,
        price: parseFloat(updates.price),
        category: updates.category,
        description: updates.description || '',
        veg: updates.veg,
        updatedAt: serverTimestamp()
      };
      if (file) updateData.image = await compressImage(file);
      await updateDoc(doc(db, "menu", id), updateData);
      await addLog('UPDATE_MENU_ITEM', `Updated ${updates.name}`);
      showNotification(`✅ "${updates.name}" updated!`);
      render();
      return true;
    } catch (error) { showNotification("Error: " + error.message, 'error'); return false; }
  }
  
  async function deleteMenuItem(id, name) {
    if (!confirm(`⚠️ Delete "${name}" permanently?`)) return;
    try {
      await deleteDoc(doc(db, "menu", id));
      await addLog('DELETE_MENU_ITEM', `Deleted ${name}`);
      showNotification(`✅ "${name}" deleted!`);
    } catch (error) { showNotification("Error deleting", 'error'); }
  }
  
  async function toggleMenuItemAvailability(id, currentStatus, name) {
    try {
      await updateDoc(doc(db, "menu", id), { available: !currentStatus });
      await addLog('TOGGLE_MENU', `${name} ${!currentStatus ? 'available' : 'unavailable'}`);
      showNotification(`${name} ${!currentStatus ? 'available' : 'unavailable'}`);
    } catch (error) { showNotification("Error updating status", 'error'); }
  }
  
  // ======================== STAFF CRUD ========================
  async function addStaff(staffData) {
    try {
      await addDoc(collection(db, "staff"), { restaurantId: currentUser.uid, ...staffData, createdAt: serverTimestamp() });
      await addLog('ADD_STAFF', `Added ${staffData.name}`);
      showNotification(`Staff ${staffData.name} added`);
    } catch (error) { showNotification("Error adding staff", 'error'); }
  }
  
  async function updateStaff(id, staffData) {
    try {
      await updateDoc(doc(db, "staff", id), staffData);
      await addLog('EDIT_STAFF', `Updated ${staffData.name}`);
      showNotification(`Staff updated`);
    } catch (error) { showNotification("Error updating staff", 'error'); }
  }
  
  async function deleteStaff(id, name) {
    if (!confirm(`Remove ${name}?`)) return;
    try {
      await deleteDoc(doc(db, "staff", id));
      await addLog('DELETE_STAFF', `Removed ${name}`);
      showNotification(`Staff removed`);
    } catch (error) { showNotification("Error deleting staff", 'error'); }
  }
  
  // ======================== INVENTORY CRUD ========================
  async function addInventory(itemData) {
    try {
      await addDoc(collection(db, "inventory"), { restaurantId: currentUser.uid, ...itemData, createdAt: serverTimestamp() });
      await addLog('ADD_INVENTORY', `Added ${itemData.name}`);
      showNotification(`Item ${itemData.name} added`);
    } catch (error) { showNotification("Error adding item", 'error'); }
  }
  
  async function updateInventory(id, itemData) {
    try {
      await updateDoc(doc(db, "inventory", id), itemData);
      await addLog('EDIT_INVENTORY', `Updated ${itemData.name}`);
      showNotification(`Inventory updated`);
    } catch (error) { showNotification("Error updating inventory", 'error'); }
  }
  
  async function deleteInventory(id, name) {
    if (!confirm(`Delete ${name}?`)) return;
    try {
      await deleteDoc(doc(db, "inventory", id));
      await addLog('DELETE_INVENTORY', `Removed ${name}`);
      showNotification(`Item removed`);
    } catch (error) { showNotification("Error deleting item", 'error'); }
  }
  
  // ======================== EXPENSE CRUD ========================
  async function addExpense(expenseData) {
    try {
      await addDoc(collection(db, "expenses"), { restaurantId: currentUser.uid, ...expenseData, date: new Date().toISOString(), createdAt: serverTimestamp() });
      await addLog('ADD_EXPENSE', `${expenseData.category}: ${formatCurrency(expenseData.amount)}`);
      showNotification(`Expense added`);
    } catch (error) { showNotification("Error adding expense", 'error'); }
  }
  
  async function deleteExpense(id) {
    if (!confirm('Delete expense?')) return;
    try {
      await deleteDoc(doc(db, "expenses", id));
      await addLog('DELETE_EXPENSE', 'Deleted expense');
      showNotification(`Expense deleted`);
    } catch (error) { showNotification("Error deleting expense", 'error'); }
  }
  
  // ======================== REVIEW CRUD ========================
  async function addReviewResponse(reviewId, response) {
    try {
      await updateDoc(doc(db, "reviews", reviewId), { response, respondedAt: serverTimestamp() });
      await addLog('REVIEW_RESPONSE', `Replied to review`);
      showNotification(`Response added`);
    } catch (error) { showNotification("Error adding response", 'error'); }
  }
  
  // ======================== AUTHENTICATION ========================
  async function login(email, password) {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      isLoggedIn = true;
      localStorage.setItem('owner_logged', 'true');
      
      // Load restaurant data
      const q = query(collection(db, "restaurants"), where("userId", "==", currentUser.uid));
      const snapshot = await getDocs(q);
      if (!snapshot.empty) {
        const data = snapshot.docs[0].data();
        restaurantSettings.name = data.name || restaurantSettings.name;
        restaurantSettings.address = data.address || restaurantSettings.address;
        restaurantSettings.phone = data.phone || restaurantSettings.phone;
      }
      
      await addLog('OWNER_LOGIN', 'Logged in');
      initializeDataListeners();
      render();
    } catch (error) {
      showNotification('Invalid credentials', 'error');
    }
  }
  
  async function register(email, password, name, restoName, address, phone) {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      await updateProfile(currentUser, { displayName: name });
      
      await setDoc(doc(db, "restaurants", currentUser.uid), {
        userId: currentUser.uid,
        name: restoName,
        owner: name,
        email: email,
        address: address,
        phone: phone,
        createdAt: serverTimestamp()
      });
      
      isLoggedIn = true;
      localStorage.setItem('owner_logged', 'true');
      restaurantSettings.name = restoName;
      restaurantSettings.address = address;
      restaurantSettings.phone = phone;
      
      await addLog('OWNER_REGISTER', `Registered restaurant: ${restoName}`);
      initializeDefaultData();
      initializeDataListeners();
      render();
    } catch (error) { showNotification(error.message, 'error'); }
  }
  
  async function initializeDefaultData() {
    const defaultMenu = [
      { name: "Paneer Tikka", price: 220, category: "Starters", description: "Grilled cottage cheese", veg: true, cost: 140, image: "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?w=80&h=80&fit=crop" },
      { name: "Chicken Biryani", price: 320, category: "Main Course", description: "Fragrant basmati rice with chicken", veg: false, cost: 200, image: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=80&h=80&fit=crop" },
      { name: "Butter Naan", price: 45, category: "Breads", description: "Soft butter naan", veg: true, cost: 30, image: "https://images.pexels.com/photos/958545/pexels-photo-958545.jpeg?w=80&h=80&fit=crop" },
      { name: "Mango Lassi", price: 90, category: "Beverages", description: "Sweet mango yogurt drink", veg: true, cost: 55, image: "https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?w=80&h=80&fit=crop" }
    ];
    for (const item of defaultMenu) {
      await addDoc(collection(db, "menu"), { restaurantId: currentUser.uid, ...item, available: true, createdAt: serverTimestamp() });
    }
  }
  
  function initializeDataListeners() {
    listenToMenu();
    listenToOrders();
    listenToStaff();
    listenToInventory();
    listenToExpenses();
    listenToReviews();
    listenToLogs();
  }
  
  async function logout() {
    await signOut(auth);
    currentUser = null;
    isLoggedIn = false;
    localStorage.removeItem('owner_logged');
    render();
  }
  
  function toggleDarkMode() {
    darkMode = !darkMode;
    localStorage.setItem('ownerDarkMode', darkMode);
    if (darkMode) document.body.classList.add('dark-mode');
    else document.body.classList.remove('dark-mode');
    render();
  }
  
  function checkAuthState() {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        isLoggedIn = true;
        
        const q = query(collection(db, "restaurants"), where("userId", "==", currentUser.uid));
        const snapshot = await getDocs(q);
        if (!snapshot.empty) {
          const data = snapshot.docs[0].data();
          restaurantSettings.name = data.name || restaurantSettings.name;
          restaurantSettings.address = data.address || restaurantSettings.address;
          restaurantSettings.phone = data.phone || restaurantSettings.phone;
        }
        
        initializeDataListeners();
        render();
      } else {
        isLoggedIn = false;
        render();
      }
    });
  }
  
  // ======================== BUSINESS STATS ========================
  function getBusinessStats() {
    const totalOrders = orders.length;
    const avgOrderValue = totalOrders ? orders.reduce((s, o) => s + (o.totalPrice || 0), 0) / totalOrders : 0;
    const avgRating = reviews.length ? reviews.reduce((s, r) => s + (r.rating || 4), 0) / reviews.length : 4.5;
    const lowStockItems = inventory.filter(i => i.quantity <= i.threshold);
    const bestSeller = menuItems.sort((a, b) => (b.orders || 0) - (a.orders || 0))[0];
    return { totalOrders, avgOrderValue, avgRating, lowStockItems, bestSeller };
  }
  
  function getFinancialStats() {
    const totalRevenue = orders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
    const totalProfit = totalRevenue - totalExpenses;
    const profitMargin = totalRevenue ? (totalProfit / totalRevenue * 100).toFixed(1) : 0;
    return { totalRevenue, totalExpenses, totalProfit, profitMargin };
  }
  
  function getAnalyticsData() {
    const monthlySales = {};
    const categorySales = {};
    orders.forEach(order => {
      if (order.status !== 'Declined') {
        const date = new Date(order.timestamp);
        const monthYear = `${date.toLocaleString('default', { month: 'short' })} ${date.getFullYear()}`;
        monthlySales[monthYear] = (monthlySales[monthYear] || 0) + order.totalPrice;
        order.items?.forEach(item => {
          categorySales[item.name] = (categorySales[item.name] || 0) + (item.price * item.quantity);
        });
      }
    });
    const sortedMonths = Object.keys(monthlySales).slice(-6);
    const monthlyData = sortedMonths.map(m => monthlySales[m]);
    const topItems = Object.entries(categorySales).sort((a,b) => b[1] - a[1]).slice(5);
    return { monthlyLabels: sortedMonths, monthlyData, topItems };
  }
  
  // ======================== RENDER FUNCTIONS ========================
  function renderLogin() {

  function renderOrders() {

  function renderAnalytics() {
    const analytics = getAnalyticsData();
    const financial = getFinancialStats();
    setTimeout(() => {
      const revCtx = document.getElementById('revenueChart')?.getContext('2d');
      if (revCtx) {
        if (revenueChart) revenueChart.destroy();
        revenueChart = new Chart(revCtx, { type: 'line', data: { labels: analytics.monthlyLabels, datasets: [{ label: 'Revenue (₹)', data: analytics.monthlyData, borderColor: '#f97316', fill: true }] }, options: { responsive: true } });
      }
    }, 100);
    return `<div class="p-6"><h1 class="text-2xl font-bold mb-2">Analytics Dashboard</h1><div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6"><div class="bg-white rounded-xl p-5"><p class="text-gray-500">Total Revenue</p><p class="text-2xl font-bold text-green-600">${formatCurrency(financial.totalRevenue)}</p></div><div class="bg-white rounded-xl p-5"><p class="text-gray-500">Total Orders</p><p class="text-2xl font-bold text-blue-600">${orders.length}</p></div><div class="bg-white rounded-xl p-5"><p class="text-gray-500">Avg Order Value</p><p class="text-2xl font-bold text-orange-600">${formatCurrency(financial.totalRevenue / (orders.length || 1))}</p></div></div><div class="bg-white rounded-xl p-5"><h3 class="font-bold mb-4">Revenue Trend</h3><div class="h-80"><canvas id="revenueChart"></canvas></div></div></div>`;
  }

    return `<div class="p-6 max-w-4xl"><h1 class="text-2xl font-bold mb-2">Settings</h1><div class="bg-white rounded-xl p-6 space-y-6"><div><h3 class="font-bold text-lg">🏪 Restaurant Information</h3><input id="restoName" class="w-full border rounded-lg p-2 mb-2" value="${restaurantSettings.name}"><textarea id="restoAddress" rows="2" class="w-full border rounded-lg p-2 mb-2">${restaurantSettings.address}</textarea><input id="restoPhone" class="w-full border rounded-lg p-2 mb-2" value="${restaurantSettings.phone}"><input id="restoEmail" class="w-full border rounded-lg p-2" value="${restaurantSettings.email}"></div><button onclick="window.saveSettings()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold">Save Settings</button></div></div>`;

  function renderModals() {

    if (showStaffModal) {

    }

    }

      modalHtml = `<div class="modal"><div class="modal-content"><h2 class="text-xl font-bold mb-4">${editingMenuItem ? 'Edit Menu Item' : 'Add Menu Item'}</h2><input id="itemName" placeholder="Item Name" class="w-full border rounded-lg p-2 mb-2" value="${editingMenuItem?.name || ''}"><input id="itemPrice" type="number" placeholder="Price" class="w-full border rounded-lg p-2 mb-2" value="${editingMenuItem?.price || ''}"><select id="itemCategory" class="w-full border rounded-lg p-2 mb-2"><option>Starters</option><option>Main Course</option><option>Breads</option><option>Beverages</option><option>Desserts</option></select><textarea id="itemDescription" rows="2" placeholder="Description" class="w-full border rounded-lg p-2 mb-2">${editingMenuItem?.description || ''}</textarea><div class="flex gap-4 mb-2"><label><input type="radio" name="vegType" value="veg" ${editingMenuItem?.veg !== false ? 'checked' : ''}> Veg</label><label><input type="radio" name="vegType" value="nonveg" ${editingMenuItem?.veg === false ? 'checked' : ''}> Non-Veg</label></div><div class="upload-area p-3 text-center border-2 border-dashed rounded-lg cursor-pointer" onclick="document.getElementById('imageUpload').click()"><i class="fas fa-cloud-upload-alt"></i> Click to upload image</div><input type="file" id="imageUpload" accept="image/*" class="hidden"><div id="imagePreviewContainer" class="text-center mt-2 ${!imagePreviewUrl && !editingMenuItem?.image ? 'hidden' : ''}"><img id="imagePreview" src="${imagePreviewUrl || editingMenuItem?.image || ''}" class="w-20 h-20 rounded-lg object-cover mx-auto"></div><div class="flex gap-2 mt-4"><button onclick="window.saveMenuItem()" class="flex-1 bg-orange-600 text-white py-2 rounded-lg">Save</button><button onclick="window.closeModals()" class="flex-1 bg-gray-200 py-2 rounded-lg">Cancel</button></div></div></div>`;

  function renderMainContent() {
    switch(currentView) {
      case 'dashboard': return renderDashboard();
      case 'orders': return renderOrders();
      case 'menu': return renderMenuManagement();
      case 'analytics': return renderAnalytics();
      case 'staff': return renderStaff();
      case 'inventory': return renderInventory();
      case 'reviews': return renderReviews();
      case 'expenses': return renderExpenses();
      case 'logs': return renderLogs();
      case 'settings': return renderSettings();
      default: return renderDashboard();
    }
  }
  
  function render() {
    const root = document.getElementById('owner-portal');
    if (!root) return;
    if (!isLoggedIn) { root.innerHTML = renderLogin(); attachLoginEvents(); return; }
    if (darkMode) document.body.classList.add('dark-mode'); else document.body.classList.remove('dark-mode');
    root.innerHTML = `<div class="min-h-screen bg-gray-50">${renderSidebar()}<div class="main-content">${renderMainContent()}</div>${renderModals()}</div>`;
    
    document.querySelectorAll('.sidebar-nav').forEach(el => { el.addEventListener('click', () => { currentView = el.dataset.view; render(); }); });
    document.getElementById('darkModeToggle')?.addEventListener('click', toggleDarkMode);
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
  }
  
  function attachLoginEvents() {
    document.getElementById('loginBtn')?.addEventListener('click', () => { const email = document.getElementById('loginEmail')?.value; const pwd = document.getElementById('loginPassword')?.value; if(email && pwd) login(email, pwd); });
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); });
    document.getElementById('registerBtn')?.addEventListener('click', () => { const name = document.getElementById('regName')?.value; const resto = document.getElementById('regRestoName')?.value; const email = document.getElementById('regEmail')?.value; const pwd = document.getElementById('regPassword')?.value; const addr = document.getElementById('regAddress')?.value; const phone = document.getElementById('regPhone')?.value; if(name && resto && email && pwd) register(email, pwd, name, resto, addr, phone); });
  }
  
  // Global Functions
  window.openMenuItemModal = () => { editingMenuItem = null; selectedImageFile = null; imagePreviewUrl = null; showMenuItemModal = true; render(); };
  window.editMenuItem = (id) => { editingMenuItem = menuItems.find(i => i.id === id); selectedImageFile = null; imagePreviewUrl = editingMenuItem?.image; showMenuItemModal = true; render(); };
  window.saveMenuItem = async () => {
    const name = document.getElementById('itemName')?.value;
    const price = parseFloat(document.getElementById('itemPrice')?.value);
    const category = document.getElementById('itemCategory')?.value;
    const description = document.getElementById('itemDescription')?.value;
    const veg = document.querySelector('input[name="vegType"]:checked')?.value === 'veg';
    const file = document.getElementById('imageUpload')?.files[0];
    if (!name || !price) { showNotification('Please fill name and price', 'error'); return; }
    if (editingMenuItem) await updateMenuItem(editingMenuItem.id, { name, price, category, description, veg }, file);
    else await addMenuItem({ name, price, category, description, veg }, file);
    showMenuItemModal = false; editingMenuItem = null; selectedImageFile = null; imagePreviewUrl = null; render();
  };
  window.toggleMenuItem = toggleMenuItemAvailability;
  window.deleteMenuItem = deleteMenuItem;
  window.openStaffModal = (staff = null) => { editingStaff = staff; showStaffModal = true; render(); };
  window.editStaff = async (id) => { const staff = staffMembers.find(s => s.id === id); if(staff) openStaffModal(staff); };
  window.saveStaff = async () => {
    const name = document.getElementById('staffName')?.value;
    const role = document.getElementById('staffRole')?.value;
    const salary = parseFloat(document.getElementById('staffSalary')?.value);
    const phone = document.getElementById('staffPhone')?.value;
    if (!name || !role || !salary) { showNotification('Please fill all fields', 'error'); return; }
    if (editingStaff) await updateStaff(editingStaff.id, { name, role, salary, phone });
    else await addStaff({ name, role, salary, phone });
    showStaffModal = false; editingStaff = null; render();
  };
  window.deleteStaff = deleteStaff;
  window.openInventoryModal = (item = null) => { editingInventory = item; showInventoryModal = true; render(); };
  window.editInventory = (id) => { const inv = inventory.find(i => i.id === id); if(inv) openInventoryModal(inv); };
  window.saveInventory = async () => {
    const name = document.getElementById('invName')?.value;
    const quantity = parseFloat(document.getElementById('invQuantity')?.value);
    const unit = document.getElementById('invUnit')?.value;
    const threshold = parseFloat(document.getElementById('invThreshold')?.value);
    if (!name || isNaN(quantity) || !unit) { showNotification('Please fill all fields', 'error'); return; }
    if (editingInventory) await updateInventory(editingInventory.id, { name, quantity, unit, threshold });
    else await addInventory({ name, quantity, unit, threshold });
    showInventoryModal = false; editingInventory = null; render();
  };
  window.deleteInventory = deleteInventory;
  window.addExpensePrompt = () => {
    const category = prompt('Category:'); if(!category) return;
    const amount = parseFloat(prompt('Amount:')); if(!amount) return;
    const description = prompt('Description:'); if(!description) return;
    addExpense({ category, amount, description });
  };
  window.deleteExpense = deleteExpense;
  window.addReviewResponse = (id) => {
    const response = prompt('Add response to review:');
    if (response) addReviewResponse(id, response);
  };
  window.saveSettings = () => {
    restaurantSettings.name = document.getElementById('restoName')?.value || restaurantSettings.name;
    restaurantSettings.address = document.getElementById('restoAddress')?.value || restaurantSettings.address;
    restaurantSettings.phone = document.getElementById('restoPhone')?.value || restaurantSettings.phone;
    restaurantSettings.email = document.getElementById('restoEmail')?.value || restaurantSettings.email;
    showNotification('Settings saved!', 'success');
    render();
  };
  window.closeModals = () => { showStaffModal = false; showInventoryModal = false; showMenuItemModal = false; editingStaff = null; editingInventory = null; editingMenuItem = null; selectedImageFile = null; imagePreviewUrl = null; render(); };
  
  // Order action handlers
  window.acceptOrder = async (id) => { await updateDoc(doc(db, "orders", id), { status: 'Accepted' }); showNotification('Order accepted'); render(); };
  window.declineOrder = async (id) => { if(confirm('Decline this order?')) await updateDoc(doc(db, "orders", id), { status: 'Declined' }); render(); };
  window.prepareOrder = async (id) => { await updateDoc(doc(db, "orders", id), { status: 'Preparing' }); render(); };
  window.readyOrder = async (id) => { await updateDoc(doc(db, "orders", id), { status: 'Ready' }); render(); };
  window.serveOrder = async (id) => { await updateDoc(doc(db, "orders", id), { status: 'Served' }); render(); };
  window.printBill = (order) => {
    const printWindow = window.open('', '_blank');
    const orderDate = new Date(order.timestamp).toLocaleString();
    printWindow.document.write(`<!DOCTYPE html><html><head><title>Bill #${order.billNumber}</title><style>body{font-family:monospace;padding:20px;}</style></head><body><div><h2>${restaurantSettings.name}</h2><p>Bill: ${order.billNumber} | Table: ${order.tableNumber}</p><p>Date: ${orderDate}</p><table border="1"><tr><th>Item</th><th>Qty</th><th>Price</th><th>Total</th></tr>${order.items.map(i => `<tr><td>${i.name}</td><td>${i.quantity}</td><td>${formatCurrency(i.price)}</td><td>${formatCurrency(i.price * i.quantity)}</td></tr>`).join('')}</table><h3>Total: ${formatCurrency(order.totalPrice)}</h3><p>Thank you!</p></div><script>window.print();setTimeout(window.close,1000);<\/script></body></html>`);
    printWindow.document.close();
  };
  
  // Image upload handler
  document.addEventListener('change', (e) => {
    if (e.target.id === 'imageUpload') {
      const file = e.target.files[0];
      if (file) {
        selectedImageFile = file;
        const reader = new FileReader();
        reader.onload = (ev) => { imagePreviewUrl = ev.target.result; render(); };
        reader.readAsDataURL(file);
      }
    }
  });
  
  checkAuthState();
</script>
</body>
</html>
