<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>QR Dine | Digital Menu & Ordering with Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Razorpay Script -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; }
    .menu-item { transition: all 0.2s ease; cursor: pointer; }
    .menu-item:active { transform: scale(0.98); }
    .food-image { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; background: #f1f5f9; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    .veg-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .veg-dot.green { background: #22c55e; box-shadow: 0 0 0 2px #dcfce7; }
    .veg-dot.red { background: #ef4444; box-shadow: 0 0 0 2px #fee2e2; }
    .section-tab { transition: all 0.2s; cursor: pointer; }
    .section-tab.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; }
    .cart-badge { position: absolute; top: -8px; right: -8px; background: linear-gradient(135deg, #f97316, #ea580c); color: white; border-radius: 50%; min-width: 22px; height: 22px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .payment-option { transition: all 0.2s ease; cursor: pointer; border: 2px solid transparent; }
    .payment-option.selected { border-color: #f97316; background: #fef3c7; }
    .payment-option:hover { transform: translateY(-2px); }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app-root"></div>

<script type="module">
  // ======================== FIREBASE CONFIGURATION ========================
  const firebaseConfig = {
    apiKey: "AIzaSyDnTl39uYi-NHhBEMeObezN2Uyqkk8sk6Q",
    authDomain: "qrdines-829b7.firebaseapp.com",
    projectId: "qrdines-829b7",
    storageBucket: "qrdines-829b7.firebasestorage.app",
    messagingSenderId: "1025530812948",
    appId: "1:1025530812948:web:66f8e69e0d5af83461e501",
    measurementId: "G-8Y4DWD208G"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot, 
    query, 
    where, 
    doc, 
    serverTimestamp,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  
  // ======================== TAX CONFIGURATION ========================
  const TAX_SETTINGS = {
    cgst: { rate: 2.5, name: "CGST" },
    sgst: { rate: 2.5, name: "SGST" },
    serviceCharge: { rate: 5, name: "Service Charge", enabled: true },
    roundOff: true
  };
  
  // ======================== GET RESTAURANT ID FROM URL ========================
  function getRestaurantIdFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    let restaurantId = urlParams.get('restaurant') || urlParams.get('r') || urlParams.get('id');
    return restaurantId;
  }
  
  // ======================== GLOBAL STATE ========================
  let menuItems = [];
  let cart = [];
  let tableNumber = new URLSearchParams(window.location.search).get('table') || '1';
  let restaurantId = getRestaurantIdFromURL();
  let currentStep = 1;
  let currentOrderId = null;
  let currentOrder = null;
  let selectedCategory = 'All';
  let selectedFoodType = 'all';
  let isLoading = true;
  let unsubscribeMenu = null;
  let unsubscribeOrder = null;
  let restaurantData = null;
  let selectedPaymentMethod = 'counter';
  let isProcessingPayment = false;
  let billCounter = 1;
  
  function loadBillCounter() { const saved = localStorage.getItem('bill_counter'); if (saved) billCounter = parseInt(saved); else billCounter = 1; }
  function saveBillCounter() { localStorage.setItem('bill_counter', billCounter); }
  function getNextBillNumber() { const billNum = billCounter; billCounter++; saveBillCounter(); return String(billNum).padStart(4, '0'); }
  
  const categories = ['All', 'Starters', 'Main Course', 'Breads', 'Beverages', 'Desserts'];
  
  // ======================== DEFAULT MENU ========================
  const DEFAULT_MENU = [
    { id: 1, name: "Paneer Tikka", price: 220, image: "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?w=150&h=150&fit=crop", category: "Starters", description: "Grilled cottage cheese", rating: 4.5, veg: true, popular: true },
    { id: 2, name: "Chicken 65", price: 280, image: "https://images.pexels.com/photos/2338407/pexels-photo-2338407.jpeg?w=150&h=150&fit=crop", category: "Starters", description: "Spicy deep-fried chicken", rating: 4.8, veg: false, popular: true },
    { id: 3, name: "Butter Chicken", price: 380, image: "https://images.pexels.com/photos/2338407/pexels-photo-2338407.jpeg?w=150&h=150&fit=crop", category: "Main Course", description: "Creamy tomato-based curry", rating: 4.9, veg: false, popular: true },
    { id: 4, name: "Veg Biryani", price: 250, image: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=150&h=150&fit=crop", category: "Main Course", description: "Fragrant rice with vegetables", rating: 4.6, veg: true, popular: false },
    { id: 5, name: "Mango Lassi", price: 90, image: "https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?w=150&h=150&fit=crop", category: "Beverages", description: "Refreshing mango drink", rating: 4.9, veg: true, popular: true }
  ];
  
  function calculateBillWithTax(subtotal) {
    const cgstAmount = (subtotal * TAX_SETTINGS.cgst.rate) / 100;
    const sgstAmount = (subtotal * TAX_SETTINGS.sgst.rate) / 100;
    let serviceChargeAmount = TAX_SETTINGS.serviceCharge.enabled ? (subtotal * TAX_SETTINGS.serviceCharge.rate) / 100 : 0;
    let totalTax = cgstAmount + sgstAmount + serviceChargeAmount;
    let grandTotal = subtotal + totalTax;
    let roundOffAmount = 0;
    if (TAX_SETTINGS.roundOff) { const roundedTotal = Math.round(grandTotal); roundOffAmount = roundedTotal - grandTotal; grandTotal = roundedTotal; }
    return { subtotal, cgst: cgstAmount, sgst: sgstAmount, serviceCharge: serviceChargeAmount, totalTax, roundOff: roundOffAmount, grandTotal };
  }
  
  function saveCart() { localStorage.setItem(`cart_${restaurantId}_${tableNumber}`, JSON.stringify(cart)); }
  function loadCart() { const saved = localStorage.getItem(`cart_${restaurantId}_${tableNumber}`); cart = saved ? JSON.parse(saved) : []; }
  
  function addToCart(item) {
    const existing = cart.find(i => i.id === item.id);
    if (existing) existing.quantity = (existing.quantity || 1) + 1;
    else cart.push({ ...item, quantity: 1 });
    saveCart();
    showToast(`${item.name} added to cart`, 'success');
    render();
  }
  
  function removeFromCart(index) { const removed = cart[index]; cart.splice(index, 1); saveCart(); showToast(`${removed.name} removed`, 'info'); render(); }
  function updateQuantity(index, change) {
    const item = cart[index];
    if (item) {
      const newQty = (item.quantity || 1) + change;
      if (newQty <= 0) removeFromCart(index);
      else { item.quantity = newQty; saveCart(); render(); }
    }
  }
  function getCartTotal() { return cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0); }
  function getCartCount() { return cart.reduce((sum, item) => sum + (item.quantity || 1), 0); }
  
  async function loadRestaurantData() {
    if (!restaurantId) { showToast("Restaurant not found", "error"); return false; }
    try {
      const q = query(collection(db, "restaurants"), where("userId", "==", restaurantId));
      const snapshot = await getDocs(q);
      if (!snapshot.empty) { restaurantData = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() }; return true; }
      return false;
    } catch (error) { return false; }
  }
  
  function loadMenuFromFirebase() {
    if (!restaurantId) { isLoading = false; render(); return; }
    isLoading = true; render();
    const menuQuery = query(collection(db, "menu"), where("restaurantId", "==", restaurantId), where("available", "==", true));
    unsubscribeMenu = onSnapshot(menuQuery, (snapshot) => {
      if (!snapshot.empty) { menuItems = []; snapshot.forEach((doc) => { menuItems.push({ id: doc.id, ...doc.data() }); }); }
      else { menuItems = [...DEFAULT_MENU]; }
      isLoading = false;
      if (currentStep === 1) render();
    }, (error) => { menuItems = [...DEFAULT_MENU]; isLoading = false; render(); });
  }
  
  // ======================== PAYMENT INTEGRATION ========================
  function initializeRazorpayPayment(orderDetails) {
    return new Promise((resolve, reject) => {
      const options = {
        key: "rzp_test_YourTestKeyHere", // Replace with your Razorpay Test Key
        amount: orderDetails.amount * 100, // Amount in paise
        currency: "INR",
        name: restaurantData?.name || "QR Dine",
        description: `Order #${orderDetails.billNumber}`,
        image: "https://images.pexels.com/photos/67468/pexels-photo-67468.jpeg?w=80&h=80&fit=crop",
        prefill: {
          name: "Customer",
          email: "customer@example.com",
          contact: "9999999999"
        },
        notes: {
          address: restaurantData?.address || "Restaurant Address",
          billNumber: orderDetails.billNumber
        },
        theme: {
          color: "#f97316"
        },
        handler: function(response) {
          resolve({ success: true, paymentId: response.razorpay_payment_id });
        },
        modal: {
          ondismiss: function() {
            reject({ success: false, error: "Payment cancelled" });
          }
        }
      };
      const rzp = new Razorpay(options);
      rzp.open();
    });
  }
  
  async function processPayment(orderData, taxCalc) {
    if (selectedPaymentMethod === 'counter') {
      return { success: true, method: 'counter', message: 'Pay at counter' };
    }
    if (selectedPaymentMethod === 'upi') {
      showToast('UPI Payment - Please scan QR code', 'info');
      return { success: true, method: 'upi', message: 'UPI payment initiated' };
    }
    if (selectedPaymentMethod === 'card') {
      try {
        const paymentResult = await initializeRazorpayPayment({
          amount: taxCalc.grandTotal,
          billNumber: orderData.billNumber
        });
        return { success: true, method: 'card', paymentId: paymentResult.paymentId };
      } catch (error) {
        return { success: false, error: error.error || 'Payment failed' };
      }
    }
    return { success: true, method: 'cash', message: 'Cash payment at counter' };
  }
  
  async function placeOrder() {
    if (cart.length === 0) { showToast('Your cart is empty', 'error'); return false; }
    if (!restaurantId) { showToast('Restaurant not identified', 'error'); return false; }
    if (isProcessingPayment) { showToast('Payment in progress...', 'info'); return false; }
    
    const subtotal = getCartTotal();
    const taxCalc = calculateBillWithTax(subtotal);
    const billNumber = getNextBillNumber();
    
    const orderData = {
      billNumber: billNumber,
      tableNumber: parseInt(tableNumber),
      items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity || 1, veg: i.veg || true })),
      subtotal: subtotal,
      cgst: taxCalc.cgst,
      sgst: taxCalc.sgst,
      serviceCharge: taxCalc.serviceCharge,
      totalTax: taxCalc.totalTax,
      roundOff: taxCalc.roundOff,
      totalPrice: taxCalc.grandTotal,
      status: 'Pending',
      timestamp: new Date().toISOString(),
      estimatedTime: 20,
      restaurantId: restaurantId,
      restaurantName: restaurantData?.name || 'QR Dine',
      paymentMethod: selectedPaymentMethod,
      paymentStatus: 'Pending'
    };
    
    isProcessingPayment = true;
    showToast('Processing payment...', 'info');
    render();
    
    const paymentResult = await processPayment(orderData, taxCalc);
    
    if (!paymentResult.success) {
      isProcessingPayment = false;
      showToast(paymentResult.error || 'Payment failed. Please try again.', 'error');
      render();
      return false;
    }
    
    orderData.paymentStatus = 'Completed';
    if (paymentResult.paymentId) orderData.paymentId = paymentResult.paymentId;
    if (paymentResult.method) orderData.paymentMethod = paymentResult.method;
    
    try {
      const docRef = await addDoc(collection(db, "orders"), { ...orderData, createdAt: serverTimestamp() });
      currentOrderId = docRef.id;
      currentOrder = { id: docRef.id, ...orderData };
      listenToOrderStatus(currentOrderId);
      cart = [];
      saveCart();
      showToast('Order placed successfully!', 'success');
      currentStep = 3;
      isProcessingPayment = false;
      render();
      return true;
    } catch (error) {
      isProcessingPayment = false;
      showToast('Failed to place order: ' + error.message, 'error');
      return false;
    }
  }
  
  function listenToOrderStatus(orderId) {
    if (unsubscribeOrder) unsubscribeOrder();
    const orderRef = doc(db, "orders", orderId);
    unsubscribeOrder = onSnapshot(orderRef, (docSnap) => {
      if (docSnap.exists()) {
        currentOrder = { id: docSnap.id, ...docSnap.data() };
        if (currentStep === 3) render();
        const messages = { 'Accepted': 'Order accepted!', 'Preparing': 'Food is being prepared!', 'Ready': 'Order is ready!', 'Served': 'Enjoy your meal!' };
        if (messages[currentOrder.status]) showToast(messages[currentOrder.status], 'info');
      }
    });
  }
  
  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    const colors = { success: '#22c55e', error: '#ef4444', info: '#3b82f6' };
    toast.className = `fixed bottom-20 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-full shadow-lg text-white font-medium text-sm flex items-center gap-2`;
    toast.style.background = colors[type];
    toast.style.animation = "slideUp 0.3s ease-out";
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-1"></i>${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function getFilteredItems() {
    let items = selectedCategory === 'All' ? menuItems : menuItems.filter(item => item.category === selectedCategory);
    if (selectedFoodType === 'veg') items = items.filter(item => item.veg === true);
    if (selectedFoodType === 'nonveg') items = items.filter(item => item.veg === false);
    return items;
  }
  
  function formatCurrency(amount) { return '₹' + amount.toFixed(2); }
  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
  
  function renderMenuStep() {
    if (isLoading) return `<div class="max-w-4xl mx-auto px-4 py-5"><div class="loading-spinner mx-auto"></div><p class="text-center mt-4">Loading menu...</p></div>`;
    const filtered = getFilteredItems();
    const cartCount = getCartCount();
    const cartTotal = getCartTotal();
    const vegCount = menuItems.filter(i => i.veg).length;
    const nonVegCount = menuItems.filter(i => !i.veg).length;
    
    return `
      <div class="max-w-4xl mx-auto px-4 py-5 pb-28 min-h-screen">
        <div class="bg-white rounded-2xl shadow-sm p-5 mb-6 sticky top-2 z-10 backdrop-blur-sm bg-white/95 border border-gray-100">
          <div class="flex justify-between items-center">
            <div><h1 class="text-2xl font-bold bg-gradient-to-r from-orange-600 to-orange-500 bg-clip-text text-transparent">QR Dine</h1><div class="flex items-center gap-2 mt-1"><span class="text-xs bg-gray-100 px-3 py-1 rounded-full text-gray-600"><i class="fas fa-table mr-1"></i> Table ${tableNumber}</span></div></div>
            <button id="viewCartBtn" class="relative bg-orange-50 hover:bg-orange-100 transition px-4 py-2 rounded-full shadow-sm"><i class="fas fa-shopping-cart text-orange-600 text-lg"></i>${cartCount > 0 ? `<span class="cart-badge">${cartCount}</span>` : ''}</button>
          </div>
        </div>
        <div class="flex gap-3 mb-5">
          <button class="section-tab flex-1 py-2 rounded-xl font-semibold ${selectedFoodType === 'all' ? 'active bg-orange-600 text-white' : 'bg-white text-gray-600 shadow-sm'}" data-foodtype="all">All (${menuItems.length})</button>
          <button class="section-tab flex-1 py-2 rounded-xl font-semibold ${selectedFoodType === 'veg' ? 'active bg-orange-600 text-white' : 'bg-white text-gray-600 shadow-sm'}" data-foodtype="veg"><span class="veg-dot green"></span> Veg (${vegCount})</button>
          <button class="section-tab flex-1 py-2 rounded-xl font-semibold ${selectedFoodType === 'nonveg' ? 'active bg-orange-600 text-white' : 'bg-white text-gray-600 shadow-sm'}" data-foodtype="nonveg"><span class="veg-dot red"></span> Non-Veg (${nonVegCount})</button>
        </div>
        <div class="flex overflow-x-auto gap-2 mb-6 pb-2 scrollbar-hide">${categories.map(cat => `<button class="category-tab px-4 py-2 rounded-full text-sm font-medium whitespace-nowrap transition ${selectedCategory === cat ? 'bg-orange-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-100 shadow-sm'}" data-category="${cat}">${cat === 'All' ? '<i class="fas fa-grid mr-1"></i>' : ''} ${cat}</button>`).join('')}</div>
        ${filtered.length === 0 ? '<div class="text-center py-12 bg-white rounded-xl"><i class="fas fa-utensils text-4xl text-gray-300 mb-3"></i><p class="text-gray-500">No items</p></div>' : `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">${filtered.map(item => `<div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-all p-3 flex gap-3 menu-item cursor-pointer" data-item='${JSON.stringify(item)}'><img src="${item.image}" class="food-image" loading="lazy"><div class="flex-1"><div class="flex items-center justify-between"><div class="flex items-center gap-2"><span class="veg-dot ${item.veg ? 'green' : 'red'}"></span><h3 class="font-semibold text-gray-800 text-base">${escapeHtml(item.name)}</h3></div>${cart.find(i => i.id === item.id) ? `<span class="bg-orange-100 text-orange-600 text-xs px-2 py-0.5 rounded-full font-bold">${cart.find(i => i.id === item.id).quantity}</span>` : ''}</div><p class="text-gray-500 text-xs mt-1">${escapeHtml(item.description || 'Delicious item')}</p><div class="flex items-center gap-1 mt-1"><i class="fas fa-star text-yellow-400 text-xs"></i><span class="text-xs text-gray-500">${item.rating || 4.5}</span>${item.popular ? '<span class="ml-2 text-xs bg-orange-100 text-orange-700 px-2 py-0.5 rounded-full">Popular</span>' : ''}</div><div class="flex justify-between items-center mt-2"><span class="text-orange-600 font-bold text-lg">${formatCurrency(item.price)}</span><button class="add-to-cart-btn bg-orange-600 hover:bg-orange-700 text-white px-3 py-1.5 rounded-full text-sm font-medium transition shadow-sm"><i class="fas fa-plus text-xs"></i> Add</button></div></div></div>`).join('')}</div>`}
        ${cartCount > 0 ? `<div class="fixed bottom-0 left-0 right-0 z-20 max-w-4xl mx-auto px-4 pb-4"><div class="bg-white rounded-2xl shadow-xl p-4 border border-gray-100 animate-slide-up"><div class="flex justify-between items-center"><div class="flex items-center gap-3"><div class="bg-orange-100 rounded-full w-10 h-10 flex items-center justify-center"><i class="fas fa-shopping-bag text-orange-600"></i></div><div><span class="font-semibold text-gray-800">${cartCount} item${cartCount > 1 ? 's' : ''}</span><span class="text-orange-600 font-bold ml-2">${formatCurrency(cartTotal)}</span></div></div><button id="checkoutFloatingBtn" class="bg-orange-600 text-white px-6 py-2.5 rounded-full font-semibold hover:bg-orange-700 transition shadow-md flex items-center gap-2">Review Order <i class="fas fa-arrow-right text-sm"></i></button></div></div></div>` : ''}
      </div>
    `;
  }
  
  function renderCartStep() {
    const subtotal = getCartTotal();
    const taxCalc = calculateBillWithTax(subtotal);
    if (cart.length === 0) {
      return `<div class="min-h-screen flex items-center justify-center px-4"><div class="bg-white rounded-2xl p-8 text-center max-w-md shadow-sm"><div class="bg-gray-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-shopping-cart text-4xl text-gray-400"></i></div><h2 class="text-xl font-semibold text-gray-800">Your cart is empty</h2><button id="backToMenuEmptyBtn" class="mt-6 bg-orange-600 text-white px-6 py-2.5 rounded-full font-semibold">Browse Menu</button></div></div>`;
    }
    return `
      <div class="max-w-2xl mx-auto px-4 py-5 pb-28 min-h-screen">
        <div class="flex items-center gap-4 mb-6"><button id="backToMenuFromCart" class="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-600 hover:text-orange-600 transition"><i class="fas fa-arrow-left text-lg"></i></button><h1 class="text-2xl font-bold text-gray-800">Your Cart</h1><span class="text-sm text-gray-500 ml-auto">Table ${tableNumber}</span></div>
        <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">${cart.map((item, idx) => `<div class="flex items-center gap-3 p-4 border-b last:border-0 hover:bg-gray-50 transition"><img src="${item.image}" class="w-14 h-14 rounded-lg object-cover"><div class="flex-1"><div class="flex items-center gap-2"><span class="veg-dot ${item.veg ? 'green' : 'red'}"></span><h3 class="font-semibold text-gray-800">${escapeHtml(item.name)}</h3></div><p class="text-orange-600 font-medium text-sm">${formatCurrency(item.price)}</p></div><div class="flex items-center gap-2"><button class="qty-dec w-8 h-8 rounded-full bg-gray-100 text-gray-600 hover:bg-orange-100 hover:text-orange-600 transition flex items-center justify-center" data-index="${idx}"><i class="fas fa-minus text-sm"></i></button><span class="font-semibold w-8 text-center text-gray-800">${item.quantity || 1}</span><button class="qty-inc w-8 h-8 rounded-full bg-gray-100 text-gray-600 hover:bg-orange-100 hover:text-orange-600 transition flex items-center justify-center" data-index="${idx}"><i class="fas fa-plus text-sm"></i></button><button class="remove-item ml-1 w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-100 transition flex items-center justify-center" data-index="${idx}"><i class="fas fa-trash-alt text-sm"></i></button></div></div>`).join('')}</div>
        
        <!-- Payment Options Section -->
        <div class="bg-white rounded-xl shadow-sm p-5 mb-6">
          <h3 class="font-bold text-gray-800 mb-3">💳 Select Payment Method</h3>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="payment-option p-3 rounded-lg text-center ${selectedPaymentMethod === 'counter' ? 'selected bg-orange-50 border-orange-500' : 'bg-gray-50'}" onclick="window.selectPaymentMethod('counter')">
              <i class="fas fa-building text-2xl text-gray-600 mb-1"></i>
              <p class="text-sm font-medium">Pay at Counter</p>
            </div>
            <div class="payment-option p-3 rounded-lg text-center ${selectedPaymentMethod === 'upi' ? 'selected bg-orange-50 border-orange-500' : 'bg-gray-50'}" onclick="window.selectPaymentMethod('upi')">
              <i class="fas fa-mobile-alt text-2xl text-blue-600 mb-1"></i>
              <p class="text-sm font-medium">UPI / QR Code</p>
            </div>
            <div class="payment-option p-3 rounded-lg text-center ${selectedPaymentMethod === 'card' ? 'selected bg-orange-50 border-orange-500' : 'bg-gray-50'}" onclick="window.selectPaymentMethod('card')">
              <i class="fas fa-credit-card text-2xl text-purple-600 mb-1"></i>
              <p class="text-sm font-medium">Card (Razorpay)</p>
            </div>
            <div class="payment-option p-3 rounded-lg text-center ${selectedPaymentMethod === 'cash' ? 'selected bg-orange-50 border-orange-500' : 'bg-gray-50'}" onclick="window.selectPaymentMethod('cash')">
              <i class="fas fa-money-bill-wave text-2xl text-green-600 mb-1"></i>
              <p class="text-sm font-medium">Cash</p>
            </div>
          </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-5 mb-6">
          <h3 class="font-bold text-gray-800 mb-3">Bill Summary</h3>
          <div class="space-y-2"><div class="flex justify-between items-center pb-2 border-b"><span class="text-gray-600">Subtotal</span><span class="font-medium">${formatCurrency(taxCalc.subtotal)}</span></div><div class="flex justify-between items-center text-sm"><span class="text-gray-500">CGST (2.5%)</span><span class="font-medium">${formatCurrency(taxCalc.cgst)}</span></div><div class="flex justify-between items-center text-sm"><span class="text-gray-500">SGST (2.5%)</span><span class="font-medium">${formatCurrency(taxCalc.sgst)}</span></div><div class="flex justify-between items-center text-sm"><span class="text-gray-500">Service Charge (5%)</span><span class="font-medium">${formatCurrency(taxCalc.serviceCharge)}</span></div>${taxCalc.roundOff !== 0 ? `<div class="flex justify-between items-center text-sm"><span class="text-gray-500">Round Off</span><span class="font-medium">${taxCalc.roundOff > 0 ? '+' : ''}${formatCurrency(taxCalc.roundOff)}</span></div>` : ''}<div class="border-t-2 border-dashed pt-3 mt-2"><div class="flex justify-between items-center"><span class="text-lg font-bold text-gray-800">Total Amount</span><span class="text-2xl font-bold text-orange-600">${formatCurrency(taxCalc.grandTotal)}</span></div></div></div>
        </div>
        <button id="placeOrderBtn" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all flex items-center justify-center gap-2" ${isProcessingPayment ? 'disabled' : ''}>${isProcessingPayment ? '<i class="fas fa-spinner fa-spin"></i> Processing...' : `<i class="fas fa-check-circle"></i> Place Order & Pay • ${formatCurrency(taxCalc.grandTotal)}`}</button>
        <p class="text-center text-xs text-gray-400 mt-4"><i class="fas fa-clock mr-1"></i> Estimated: 15-20 mins</p>
      </div>
    `;
  }
  
  function renderConfirmationStep() {
    if (!currentOrder) return `<div class="min-h-screen flex items-center justify-center"><div class="loading-spinner mx-auto"></div><p class="mt-2">Loading order...</p></div>`;
    const statusSteps = ['Pending', 'Accepted', 'Preparing', 'Ready', 'Served'];
    const currentIdx = statusSteps.indexOf(currentOrder.status);
    const orderDate = new Date(currentOrder.timestamp).toLocaleString();
    
    return `
      <div class="min-h-screen bg-gradient-to-b from-orange-50 to-white py-8 px-4">
        <div class="max-w-2xl mx-auto">
          <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
            <div class="text-center"><div class="inline-block bg-green-100 rounded-full p-4 mb-4"><i class="fas fa-check-circle text-green-600 text-4xl"></i></div><h2 class="text-2xl font-bold">Order Confirmed!</h2><p class="text-gray-500">Table ${currentOrder.tableNumber}</p><p class="text-sm text-green-600 mt-1">Payment: ${currentOrder.paymentMethod} • ${currentOrder.paymentStatus}</p></div>
            <div class="relative py-8"><div class="absolute top-1/2 left-0 right-0 h-1 bg-gray-200"></div><div class="relative flex justify-between">${statusSteps.map((step, idx) => `<div class="text-center flex-1"><div class="w-11 h-11 rounded-full border-2 flex items-center justify-center mx-auto ${idx < currentIdx ? 'bg-green-500 border-green-500' : idx === currentIdx ? 'bg-orange-500 border-orange-500' : 'bg-white border-gray-300'}">${idx < currentIdx ? '<i class="fas fa-check text-white text-sm"></i>' : idx + 1}</div><p class="text-xs mt-2 ${idx === currentIdx ? 'text-orange-600 font-semibold' : 'text-gray-400'}">${step}</p></div>`).join('')}</div></div>
            <div class="mt-4 p-4 bg-orange-50 rounded-lg"><div class="flex justify-between"><span>Estimated Time</span><span class="font-bold text-orange-600">${currentOrder.estimatedTime} minutes</span></div></div>
          </div>
          <div class="bg-white rounded-2xl shadow-xl overflow-hidden"><div class="p-6"><div class="text-center border-b pb-4 mb-4"><h1 class="text-2xl font-bold">${currentOrder.restaurantName}</h1><div class="flex justify-center gap-4 mt-2 text-xs"><span><strong>Bill No:</strong> ${currentOrder.billNumber}</span><span><strong>Table:</strong> ${currentOrder.tableNumber}</span><span><strong>Date:</strong> ${orderDate.split(',')[0]}</span></div></div><div class="mb-4"><table class="w-full text-sm"><thead><tr class="border-b"><th class="text-left py-2">Item</th><th class="text-center py-2">Qty</th><th class="text-right py-2">Total</th></tr></thead><tbody>${currentOrder.items.map(item => `<tr class="border-b"><td class="py-2">${item.name}</td><td class="text-center py-2">${item.quantity}</td><td class="text-right py-2">${formatCurrency(item.price * item.quantity)}</td></tr>`).join('')}</tbody></table></div><div class="border-t pt-3"><div class="flex justify-between"><span>Subtotal</span><span>${formatCurrency(currentOrder.subtotal)}</span></div><div class="flex justify-between text-sm"><span>CGST</span><span>${formatCurrency(currentOrder.cgst)}</span></div><div class="flex justify-between text-sm"><span>SGST</span><span>${formatCurrency(currentOrder.sgst)}</span></div><div class="flex justify-between font-bold pt-2 border-t"><span>Total</span><span class="text-orange-600">${formatCurrency(currentOrder.totalPrice)}</span></div></div><div class="mt-3 text-center text-sm"><p class="text-green-600 font-medium">Payment: ${currentOrder.paymentMethod} • ${currentOrder.paymentStatus}</p></div></div></div>
          <div class="flex gap-3 mt-6"><button id="newOrderBtn" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-semibold">New Order</button></div>
        </div>
      </div>
    `;
  }
  
  function attachEvents() {
    if (currentStep === 1) {
      document.querySelectorAll('[data-foodtype]').forEach(btn => btn.addEventListener('click', () => { selectedFoodType = btn.dataset.foodtype; render(); }));
      document.querySelectorAll('.category-tab').forEach(btn => btn.addEventListener('click', () => { selectedCategory = btn.dataset.category; render(); }));
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); const card = btn.closest('.menu-item'); if (card && card.dataset.item) addToCart(JSON.parse(card.dataset.item)); }));
      document.getElementById('viewCartBtn')?.addEventListener('click', () => { currentStep = 2; render(); });
      document.getElementById('checkoutFloatingBtn')?.addEventListener('click', () => { currentStep = 2; render(); });
    }
    if (currentStep === 2) {
      document.getElementById('backToMenuFromCart')?.addEventListener('click', () => { currentStep = 1; render(); });
      document.getElementById('backToMenuEmptyBtn')?.addEventListener('click', () => { currentStep = 1; render(); });
      document.querySelectorAll('.qty-inc').forEach(btn => btn.addEventListener('click', () => { updateQuantity(parseInt(btn.dataset.index), 1); }));
      document.querySelectorAll('.qty-dec').forEach(btn => btn.addEventListener('click', () => { updateQuantity(parseInt(btn.dataset.index), -1); }));
      document.querySelectorAll('.remove-item').forEach(btn => btn.addEventListener('click', () => { removeFromCart(parseInt(btn.dataset.index)); }));
      document.getElementById('placeOrderBtn')?.addEventListener('click', async () => { if (await placeOrder()) { currentStep = 3; render(); } });
    }
    if (currentStep === 3) {
      document.getElementById('newOrderBtn')?.addEventListener('click', () => { currentOrderId = null; currentOrder = null; currentStep = 1; if (unsubscribeOrder) unsubscribeOrder(); render(); });
    }
  }
  
  window.selectPaymentMethod = (method) => { selectedPaymentMethod = method; render(); };
  
  function render() {
    const root = document.getElementById('app-root');
    if (!root) return;
    let html = '';
    if (currentStep === 1) html = renderMenuStep();
    else if (currentStep === 2) html = renderCartStep();
    else if (currentStep === 3) html = renderConfirmationStep();
    root.innerHTML = html;
    attachEvents();
  }
  
  async function init() {
    loadBillCounter();
    if (!restaurantId) {
      document.getElementById('app-root').innerHTML = `<div class="min-h-screen flex items-center justify-center px-4"><div class="bg-white rounded-2xl p-8 text-center max-w-md shadow-sm"><i class="fas fa-qrcode text-5xl text-gray-300 mb-4"></i><h2 class="text-xl font-semibold">Invalid QR Code</h2><p class="text-gray-500 mt-2">Please scan a valid restaurant QR code.</p></div></div>`;
      return;
    }
    const restaurantValid = await loadRestaurantData();
    if (!restaurantValid) {
      document.getElementById('app-root').innerHTML = `<div class="min-h-screen flex items-center justify-center px-4"><div class="bg-white rounded-2xl p-8 text-center max-w-md shadow-sm"><i class="fas fa-store-slash text-5xl text-gray-300 mb-4"></i><h2 class="text-xl font-semibold">Restaurant Not Found</h2><p class="text-gray-500 mt-2">This QR code is not associated with any restaurant.</p></div></div>`;
      return;
    }
    loadCart();
    loadMenuFromFirebase();
    render();
  }
  
  init();
</script>
</body>
</html>
